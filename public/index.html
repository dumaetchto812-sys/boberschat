<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bober Chat</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow: hidden;
            background: #0a0a1a;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.3;
        }

        .app-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 16px;
            max-width: 900px;
            width: 100%;
            align-items: flex-start;
        }

        .chat-app, .sidebar {
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .chat-app::before, .sidebar::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), 
                rgba(255, 215, 0, 0.08),
                rgba(255, 100, 200, 0.08),
                rgba(0, 200, 255, 0.08)
            );
            pointer-events: none;
            z-index: 0;
            transition: background 0.1s ease;
            mix-blend-mode: overlay;
        }

        .chat-app > *, .sidebar > * {
            position: relative;
            z-index: 1;
        }

        .sidebar {
            flex: 0 0 200px;
            border-radius: 32px;
            padding: 20px 14px;
            max-height: 600px;
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 12px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }

        .sidebar-title {
            color: rgba(255,255,255,0.6);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-left: 6px;
        }

        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 16px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            transition: 0.2s;
            color: rgba(255,255,255,0.7);
        }
        .chat-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .chat-item.active {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        .chat-item i {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
        }
        .chat-item .chat-name {
            font-weight: 500;
            font-size: 0.9rem;
        }
        .chat-item .chat-badge {
            margin-left: auto;
            background: rgba(255, 215, 0, 0.2);
            color: #f7d794;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .call-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        #onlineUsers {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .online-user {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
            transition: 0.3s;
            cursor: pointer;
        }
        .online-user:hover {
            background: rgba(255,255,255,0.08);
            transform: scale(1.02);
        }
        .online-user .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-left: auto;
            flex-shrink: 0;
        }
        .online-user .status-dot.online { background: #00ff88; animation: pulse-dot 2s infinite; }
        .online-user .status-dot.away { background: #ffaa00; }
        .online-user .status-dot.do-not-disturb { background: #ff4444; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .online-user .user-avatar { font-size: 1.2rem; }
        .online-user .user-nick {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .online-user .user-username {
            font-size: 0.6rem;
            opacity: 0.5;
            color: #f093fb;
        }

        #callStatus {
            display: none;
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(255,200,0,0.1);
            border-radius: 12px;
            text-align: center;
            color: #ffd93d;
            font-size: 0.8rem;
            animation: pulse-call 1.5s infinite;
        }
        #callStatus.active { display: block; }
        @keyframes pulse-call {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.98); }
        }

        .chat-app {
            flex: 1;
            min-width: 0;
            border-radius: 48px 48px 32px 32px;
            padding: 24px 24px 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: 0.5px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: color 0.3s;
            cursor: pointer;
        }
        .brand .bober-icon {
            font-size: 1.8rem;
            line-height: 1;
        }
        .brand span { transition: color 0.3s; }

        .theme-toggles {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 8px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .theme-btn {
            background: transparent;
            border: none;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            transition: 0.2s;
            white-space: nowrap;
        }
        .theme-btn i { font-size: 0.8rem; }
        .theme-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: scale(1.1);
        }

        .theme-btn.active-light {
            background: rgba(255, 255, 255, 0.2);
            color: #111;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }
        .theme-btn.active-dark {
            background: rgba(0, 0, 0, 0.4);
            color: #f0f0f0;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.4);
        }
        .theme-btn.active-red {
            background: rgba(255, 0, 0, 0.2);
            color: #ffdddd;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.3);
        }
        .theme-btn.active-blue {
            background: rgba(0, 100, 255, 0.2);
            color: #ddeeff;
            box-shadow: 0 0 12px rgba(0, 100, 255, 0.3);
        }
        .theme-btn.active-green {
            background: rgba(0, 200, 100, 0.2);
            color: #ddffdd;
            box-shadow: 0 0 12px rgba(0, 200, 100, 0.3);
        }
        .theme-btn.active-purple {
            background: rgba(180, 0, 255, 0.2);
            color: #f0ddff;
            box-shadow: 0 0 12px rgba(180, 0, 255, 0.3);
        }
        .theme-btn.active-custom {
            background: #f093fb;
            color: #fff;
        }

        .profile-area {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px 4px 6px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 2px solid var(--profile-color, #f093fb);
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px var(--profile-color, #f093fb);
            opacity: 0.6;
        }
        .profile-area:hover {
            background: rgba(255, 255, 255, 0.1);
            opacity: 1;
            transform: scale(1.02);
            box-shadow: 0 0 30px var(--profile-color, #f093fb);
        }

        .avatar-wrapper {
            position: relative;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--profile-color, #f093fb), #f5576c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 6px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        .avatar-wrapper:hover { transform: scale(1.1); }
        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-wrapper .avatar-emoji {
            font-size: 1.3rem;
            line-height: 1;
        }

        .nick-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0px;
        }
        .nick-wrapper .user-nickname {
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
            cursor: pointer;
        }
        .nick-wrapper .user-username-display {
            font-size: 0.6rem;
            color: #f093fb;
            opacity: 0.5;
            cursor: pointer;
        }

        .chat-window {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 16px 16px;
            margin: 14px 0 14px;
            min-height: 300px;
            max-height: 380px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }
        .chat-window::-webkit-scrollbar {
            width: 4px;
        }
        .chat-window::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 12px;
        }
        .chat-window::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }

        .message {
            padding: 8px 14px;
            border-radius: 20px;
            max-width: 85%;
            word-break: break-word;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            color: #f0f0f0;
            animation: fadeUp 0.3s ease;
            font-size: 0.9rem;
            transition: transform 0.3s, background 0.3s;
        }
        .message:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.12);
        }
        .message .msg-avatar { font-size: 1rem; margin-right: 4px; }
        .message strong {
            color: #f7d794;
            margin-right: 4px;
            cursor: pointer;
        }
        .message strong:hover { text-decoration: underline; }
        .message .mention {
            color: #f093fb;
            background: rgba(255,255,255,0.05);
            padding: 0 4px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .message .mention:hover {
            background: rgba(255,255,255,0.1);
            text-decoration: underline;
        }
        .message .msg-gif, .message .msg-img {
            max-width: 100%;
            border-radius: 14px;
            margin-top: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .message .msg-gif { max-height: 140px; }
        .message .msg-img { max-height: 160px; }
        .message-self {
            align-self: flex-end;
            background: rgba(255, 215, 0, 0.12);
            border: 1px solid rgba(255, 215, 0, 0.15);
        }
        .message-other { align-self: flex-start; }
        .message-call {
            align-self: center;
            background: rgba(255, 200, 0, 0.1);
            border: 1px solid rgba(255, 200, 0, 0.15);
            text-align: center;
            font-size: 0.8rem;
            max-width: 95%;
        }
        .message-call strong { color: #ffd93d; }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(6px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .input-area {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
            align-items: center;
        }
        .input-area input[type="text"] {
            flex: 2 1 180px;
            padding: 10px 16px;
            border-radius: 60px;
            border: none;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
            color: #fff;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.3s;
            min-width: 120px;
        }
        .input-area input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .input-area input[type="text"]:focus {
            outline: none;
            border-color: rgba(255, 215, 0, 0.3);
            background: rgba(0, 0, 0, 0.35);
            transform: scale(1.02);
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            padding: 8px 12px;
            border-radius: 60px;
            color: #eee;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .action-btn i { font-size: 0.9rem; }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .action-btn.send-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
            color: white;
            box-shadow: 0 4px 10px rgba(245, 87, 108, 0.3);
        }
        .action-btn.send-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 16px rgba(245, 87, 108, 0.5);
        }
        .action-btn.call-btn {
            background: rgba(0, 200, 100, 0.15);
            border-color: rgba(0, 200, 100, 0.2);
        }
        .action-btn.call-btn:hover { background: rgba(0, 200, 100, 0.25); }
        .action-btn.call-btn.active {
            background: rgba(255, 200, 0, 0.25);
            border-color: rgba(255, 200, 0, 0.3);
            animation: pulse-call 1.5s infinite;
        }
        .action-btn.join-call-btn {
            background: rgba(0, 200, 255, 0.15);
            border-color: rgba(0, 200, 255, 0.2);
            display: none;
        }
        .action-btn.join-call-btn:hover { background: rgba(0, 200, 255, 0.25); }
        .action-btn.join-call-btn.show { display: inline-flex; }
        .action-btn.img-btn {
            background: rgba(0, 255, 150, 0.08);
            border-color: rgba(0, 255, 150, 0.12);
        }
        .action-btn.upload-btn {
            background: rgba(255, 200, 0, 0.08);
            border-color: rgba(255, 200, 0, 0.12);
        }
        .action-btn.theme-custom-btn {
            background: rgba(240, 147, 251, 0.15);
            border-color: rgba(240, 147, 251, 0.2);
        }
        .action-btn.theme-custom-btn:hover {
            background: rgba(240, 147, 251, 0.25);
        }
        #fileInput { display: none; }

        /* ===== МОДАЛ ПРОФИЛЯ ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .modal-content {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 2px solid var(--profile-color, #f093fb);
            border-radius: 32px;
            max-width: 420px;
            width: 100%;
            padding: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 40px var(--profile-color, #f093fb);
            animation: fadeUp 0.3s ease;
        }
        .modal-content .modal-close {
            float: right;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal-content .modal-close:hover { color: #fff; transform: rotate(90deg); }
        .modal-content h3 {
            color: #fff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-content .form-group { margin-bottom: 12px; }
        .modal-content .form-group label {
            display: block;
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            margin-bottom: 4px;
        }
        .modal-content .form-group input,
        .modal-content .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        .modal-content .form-group input:focus,
        .modal-content .form-group textarea:focus { border-color: #f093fb; }
        .modal-content .form-group textarea { min-height: 60px; resize: vertical; }
        .modal-content .form-group input[type="color"] { height: 40px; padding: 2px; cursor: pointer; }
        .modal-content .btn-save {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal-content .btn-save:hover { transform: scale(1.02); }

        /* ===== МОДАЛ ТЕМЫ ===== */
        .theme-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .theme-modal.active { display: flex; }
        .theme-modal-content {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 2px solid #f093fb;
            border-radius: 32px;
            max-width: 420px;
            width: 100%;
            padding: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 40px #f093fb;
            animation: fadeUp 0.3s ease;
        }
        .theme-modal-content .modal-close {
            float: right;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 1.3rem;
            cursor: pointer;
        }
        .theme-modal-content .modal-close:hover { color: #fff; transform: rotate(90deg); }
        .theme-modal-content h3 {
            color: #fff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .theme-modal-content .form-group { margin-bottom: 12px; }
        .theme-modal-content .form-group label {
            display: block;
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            margin-bottom: 4px;
        }
        .theme-modal-content .form-group input[type="color"],
        .theme-modal-content .form-group input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        .theme-modal-content .form-group input[type="color"] { height: 40px; padding: 2px; cursor: pointer; }
        .theme-modal-content .btn-save {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .theme-modal-content .btn-save:hover { transform: scale(1.02); }
        .preset-themes {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 12px;
        }
        .preset-themes button {
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.2s;
        }
        .preset-themes button:hover { background: rgba(255,255,255,0.1); }
        .preset-themes .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }

        .call-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;

    <!-- ===== КАНВАС ===== -->

    <div class="app-wrapper">

                    <i class="fas fa-home"></i>
                    <span class="chat-name">Общий чат</span>
                    <span class="chat-badge" id="chatBadge">0</span>
                </div>
            </div>

            <div class="call-section">
                <div class="sidebar-title"><i class="fas fa-phone"></i> Пользователи</div>

                </div>

                    <i class="fas fa-phone"></i> <span id="callStatusText">Идет общий звонок</span>
                </div>
            </div>
        </div>

        <!-- ===== ОСНОВНОЙ ЧАТ ===== -->
        <div class="chat-app" id="chatApp">
            <div class="header">
                <div class="brand" id="brandLogo">
                    <span class="bober-icon">🦫</span>
                    <span id="brandText">Bober Chat</span>
                </div>

                <div class="theme-toggles" id="themeToggles">
                    <button class="theme-btn active-light" data-theme="light"><i class="fas fa-sun"></i></button>
                    <button class="theme-btn" data-theme="dark"><i class="fas fa-moon"></i></button>
                    <button class="theme-btn" data-theme="red"><i class="fas fa-heart"></i></button>
                    <button class="theme-btn" data-theme="blue"><i class="fas fa-droplet"></i></button>
                    <button class="theme-btn" data-theme="green"><i class="fas fa-leaf"></i></button>
                    <button class="theme-btn" data-theme="purple"><i class="fas fa-gem"></i></button>
                    <button class="theme-btn active-custom" id="themeCustomBtn"><i class="fas fa-palette"></i></button>
                </div>

                <div class="profile-area" id="profileArea">
                    <div class="avatar-wrapper">
                        <div class="avatar-emoji" id="avatarEmoji">👤</div>
                        <img id="avatarImg" style="display:none;" alt="avatar" />
                    </div>
                    <div class="nick-wrapper">
                        <span class="user-nickname" id="nickDisplay">Гость</span>
                        <span class="user-username-display" id="usernameDisplay">@гость</span>
                    </div>
                </div>
            </div>

            <div class="chat-window" id="chatWindow">
                <div class="message message-other"><strong>🤖 Бот:</strong> Добро пожаловать в Bober Chat! 🦫</div>
            </div>

            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Напиши сообщение... @юзернейм для упоминания" />
                <button class="action-btn send-btn" id="sendMsgBtn"><i class="fas fa-paper-plane"></i></button>
                <button class="action-btn img-btn" id="addImgBtn"><i class="fas fa-image"></i> Картинка</button>
                <button class="action-btn upload-btn" id="uploadBtn"><i class="fas fa-upload"></i> Своё</button>
                <button class="action-btn call-btn" id="callBtn"><i class="fas fa-phone"></i> <span id="callBtnText">Звонок</span></button>
                <button class="action-btn join-call-btn" id="joinCallBtn"><i class="fas fa-sign-in-alt"></i> Присоединиться</button>
                <button class="action-btn theme-custom-btn" id="themeCustomizerBtn"><i class="fas fa-palette"></i></button>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            </div>

                    <label>Имя</label>

                </div>

                <div class="form-group">
                    <label>Статус</label>
                    <input type="text" id="editStatus" placeholder="В сети / Отошел / Не беспокоить" />
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="editBio"></textarea>
                </div>
                <div class="form-group">
                    <label>Цвет профиля</label>
                    <input type="color" id="editColor" value="#f093fb" />
                </div>
                <button class="btn-save" id="profileSaveBtn"><i class="fas fa-save"></i> Сохранить</button>
            </div>
        </div>
    </div>

    <!-- ===== МОДАЛ НАСТРОЙКИ ТЕМЫ ===== -->
    <div class="theme-modal" id="themeModal">
        <div class="theme-modal-content">
            <button class="modal-close" id="themeModalClose"><i class="fas fa-times"></i></button>
            <h3><i class="fas fa-palette"></i> Кастомизация темы</h3>
            <div class="preset-themes">
                <button onclick="applyPreset('dark')"><span class="dot" style="background:#0a0a1a;"></span>Тёмная</button>
                <button onclick="applyPreset('light')"><span class="dot" style="background:#f0f0f0;"></span>Светлая</button>
                <button onclick="applyPreset('red')"><span class="dot" style="background:#ff4444;"></span>Красная</button>
                <button onclick="applyPreset('blue')"><span class="dot" style="background:#4488ff;"></span>Синяя</button>
                <button onclick="applyPreset('green')"><span class="dot" style="background:#44ff88;"></span>Зелёная</button>
                <button onclick="applyPreset('purple')"><span class="dot" style="background:#aa44ff;"></span>Фиолетовая</button>
            </div>
            <div class="form-group">
                <label>Фон</label>
                <input type="color" id="customBg" value="#0a0a1a" />
            </div>
            <div class="form-group">
                <label>Цвет текста</label>
                <input type="color" id="customText" value="#ffffff" />
            </div>
            <div class="form-group">
                <label>Акцентный цвет</label>
                <input type="color" id="customAccent" value="#f093fb" />
            </div>
            <div class="form-group">
                <label>Второй акцент</label>
                <input type="color" id="customAccent2" value="#f5576c" />
            </div>
            <button class="btn-save" id="saveThemeBtn"><i class="fas fa-save"></i> Применить тему</button>
        </div>
    </div>

    <!-- ===== МОДАЛ ЗВОНКА ===== -->
    <div class="call-modal" id="callModal">
        <div class="call-info" id="callInfo">Общий звонок</div>
        <div class="participants-list" id="participantsList"></div>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted style="width: 160px; max-width: 160px; position: fixed; bottom: 100px; right: 20px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.15);"></video>
        <div class="call-controls">
            <button class="mute-btn" id="muteBtn"><i class="fas fa-microphone"></i></button>
            <button class="hangup-btn" id="hangupBtn"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ============ ПЕРЕЛИВЫ ============
            const canvas = document.getElementById('bgCanvas');
            const ctx = canvas.getContext('2d');
            let mouseX = 0.5;
            let mouseY = 0.5;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX / window.innerWidth;
                mouseY = e.clientY / window.innerHeight;
                document.querySelectorAll('.chat-app, .sidebar').forEach(el => {
                    el.style.setProperty('--mouse-x', (mouseX * 100) + '%');
                    el.style.setProperty('--mouse-y', (mouseY * 100) + '%');
                });
            });

            function drawBackground() {
                const w = canvas.width;
                const h = canvas.height;
                const grad = ctx.createRadialGradient(
                    mouseX * w, mouseY * h, 0,
                    mouseX * w, mouseY * h, Math.max(w, h) * 0.8
                );
                const hue1 = (Date.now() / 2000 + mouseX * 60) % 360;
                const hue2 = (Date.now() / 3000 + mouseY * 60 + 120) % 360;
                const hue3 = (Date.now() / 2500 + (mouseX + mouseY) * 30 + 240) % 360;
                
                grad.addColorStop(0, `hsla(${hue1}, 80%, 60%, 0.15)`);
                grad.addColorStop(0.3, `hsla(${hue2}, 80%, 40%, 0.1)`);
                grad.addColorStop(0.7, `hsla(${hue3}, 80%, 30%, 0.08)`);
                grad.addColorStop(1, `hsla(${(hue1 + 180) % 360}, 80%, 20%, 0.03)`);
                
                ctx.clearRect(0, 0, w, h);
                const bg = getComputedStyle(document.documentElement).getPropertyValue('--custom-bg').trim();
                ctx.fillStyle = bg || '#0a0a1a';
                ctx.fillRect(0, 0, w, h);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);
                
                const time = Date.now() / 5000;
                for (let i = 0; i < 30; i++) {
                    const x = (Math.sin(i * 1.7 + time * 0.3 + mouseX * 10) * 0.5 + 0.5) * w;
                    const y = (Math.cos(i * 2.3 + time * 0.2 + mouseY * 10) * 0.5 + 0.5) * h;
                    const size = 0.5 + Math.sin(time + i) * 0.3;
                    const alpha = 0.2 + Math.sin(time * 0.5 + i * 0.7) * 0.1;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.fill();
                }
                requestAnimationFrame(drawBackground);
            }
            drawBackground();

            // ============ SOCKET ============
            const socket = io();

            // ============ DOM ============
            const chatWindow = document.getElementById('chatWindow');
            const msgInput = document.getElementById('msgInput');
            const sendBtn = document.getElementById('sendMsgBtn');
            const addImgBtn = document.getElementById('addImgBtn');
            const uploadBtn = document.getElementById('uploadBtn');
            const fileInput = document.getElementById('fileInput');
            const nickDisplay = document.getElementById('nickDisplay');
            const usernameDisplay = document.getElementById('usernameDisplay');
            const avatarEmoji = document.getElementById('avatarEmoji');
            const avatarImg = document.getElementById('avatarImg');
            const themeToggles = document.getElementById('themeToggles');
            const chatList = document.getElementById('chatList');
            const chatBadge = document.getElementById('chatBadge');
            const callBtn = document.getElementById('callBtn');
            const callBtnText = document.getElementById('callBtnText');
            const joinCallBtn = document.getElementById('joinCallBtn');
            const callModal = document.getElementById('callModal');
            const callInfo = document.getElementById('callInfo');
            const participantsList = document.getElementById('participantsList');
            const remoteVideo = document.getElementById('remoteVideo');
            const localVideo = document.getElementById('localVideo');
            const muteBtn = document.getElementById('muteBtn');
            const hangupBtn = document.getElementById('hangupBtn');
            const onlineUsersDiv = document.getElementById('onlineUsers');
            const callStatus = document.getElementById('callStatus');
            const callStatusText = document.getElementById('callStatusText');
            const profileArea = document.getElementById('profileArea');

            // ===== ПРОФИЛЬ =====
            const profileModal = document.getElementById('profileModal');
            const profileModalClose = document.getElementById('profileModalClose');
            const profileEditBtn = document.getElementById('profileEditBtn');
            const profileSaveBtn = document.getElementById('profileSaveBtn');
            const profileView = document.getElementById('profileView');
            const profileEdit = document.getElementById('profileEdit');
            const profileNameBig = document.getElementById('profileNameBig');
            const profileUsernameBig = document.getElementById('profileUsernameBig');
            const profileStatusBig = document.getElementById('profileStatusBig');
            const profileBioBig = document.getElementById('profileBioBig');
            const profileAvatarBig = document.getElementById('profileAvatarBig');
            const editName = document.getElementById('editName');
            const editUsername = document.getElementById('editUsername');
            const editStatus = document.getElementById('editStatus');
            const editBio = document.getElementById('editBio');
            const editColor = document.getElementById('editColor');

            // ===== ТЕМЫ =====
            const themeModal = document.getElementById('themeModal');
            const themeModalClose = document.getElementById('themeModalClose');
            const themeCustomBtn = document.getElementById('themeCustomBtn');
            const customBg = document.getElementById('customBg');
            const customText = document.getElementById('customText');
            const customAccent = document.getElementById('customAccent');
            const customAccent2 = document.getElementById('customAccent2');
            const saveThemeBtn = document.getElementById('saveThemeBtn');

            // ============ ПЕРЕМЕННЫЕ ============
            let currentNick = localStorage.getItem('chatNick') || 'Гость';
            let currentUsername = localStorage.getItem('chatUsername') || 'гость';
            let currentAvatar = localStorage.getItem('chatAvatarEmoji') || '👤';
            let currentStatus = 'В сети';
            let currentBio = 'Привет! Я использую Bober Chat 🦫';
            let profileColor = localStorage.getItem('profileColor') || '#f093fb';
            let currentChat = 'main';
            let messageCount = 0;
            let onlineUsers = {};
            let userProfiles = {};
            let viewingUserId = null;

            // ============ ИНИЦИАЛИЗАЦИЯ ============
            nickDisplay.textContent = currentNick;
            usernameDisplay.textContent = '@' + currentUsername;
            avatarEmoji.textContent = currentAvatar;
            applyProfileColor(profileColor);

            function applyProfileColor(color) {
                profileColor = color;
                document.documentElement.style.setProperty('--profile-color', color);
                document.querySelector('.profile-area').style.setProperty('--profile-color', color);
                document.querySelector('.profile-area').style.borderColor = color;
                document.querySelector('.profile-area').style.boxShadow = `0 0 20px ${color}`;
                document.querySelector('.avatar-wrapper').style.background = `linear-gradient(135deg, ${color}, #f5576c)`;
                document.querySelector('.modal-content').style.borderColor = color;
                document.querySelector('.modal-content').style.boxShadow = `0 30px 60px rgba(0,0,0,0.5), 0 0 40px ${color}`;
                localStorage.setItem('profileColor', color);
                if (editColor) editColor.value = color;
            }

            function registerUser() {
                socket.emit('register', {
                    nick: currentNick,
                    username: currentUsername,
                    avatar: currentAvatar,
                    status: currentStatus,
                    bio: currentBio,
                    color: profileColor,
                    socketId: socket.id
                });
                console.log('📝 Регистрация:', currentNick);
            }

            // ============ ПОДКЛЮЧЕНИЕ ============
            socket.on('connect', () => {
                console.log('✅ Подключен к серверу');
                registerUser();
                socket.emit('joinChat', 'main');
            });

            socket.on('onlineUsers', (users) => {
                onlineUsers = users;
                updateOnlineUsers();
            });

            socket.on('userProfiles', (profiles) => {
                userProfiles = profiles;
            });

            socket.on('userDisconnected', (socketId) => {
                delete onlineUsers[socketId];
                delete userProfiles[socketId];
                updateOnlineUsers();
            });

            // ============ ОБНОВЛЕНИЕ ОНЛАЙН-ПОЛЬЗОВАТЕЛЕЙ ============
            function updateOnlineUsers() {
                const users = Object.values(onlineUsers).filter(u => u.socketId !== socket.id);
                if (users.length === 0) {
                    onlineUsersDiv.innerHTML = '<div style="color: rgba(255,255,255,0.3); font-size: 0.75rem; padding: 4px;">Нет онлайн-пользователей</div>';
                    return;
                }
                
                onlineUsersDiv.innerHTML = users.map(u => {
                    const statusMap = {
                        'В сети': 'online',
                        'Отошел': 'away',
                        'Не беспокоить': 'do-not-disturb'
                    };
                    const dotClass = statusMap[u.status] || 'online';
                    const username = u.username ? '@' + u.username : '';
                    return `
                        <div class="online-user" data-userid="${u.socketId}">
                            <span class="user-avatar">${u.avatar || '👤'}</span>
                            <span class="user-nick">${u.nick}</span>
                            <span class="user-username">${username}</span>
                            <span class="status-dot ${dotClass}"></span>
                        </div>
                    `;
                }).join('');
                
                document.querySelectorAll('.online-user').forEach(el => {
                    el.addEventListener('click', function() {
                        const userId = this.dataset.userid;
                        if (userId && userProfiles[userId]) {
                            openProfile(userId);
                        }
                    });
                });
            }

            // ============ ПРОФИЛЬ ============
            function openProfile(userId = null) {
                if (userId === null || userId === socket.id) {
                    showMyProfile();
                } else if (userProfiles[userId]) {
                    viewingUserId = userId;
                    const data = userProfiles[userId];
                    profileNameBig.textContent = data.nick || 'Гость';
                    profileUsernameBig.textContent = '@' + (data.username || 'пользователь');
                    profileStatusBig.textContent = data.status || '🟢 В сети';
                    profileBioBig.textContent = data.bio || 'Описание профиля';
                    profileAvatarBig.textContent = data.avatar || '👤';
                    document.getElementById('profileModalTitle').textContent = 'Профиль пользователя';
                    profileEditBtn.style.display = 'none';
                    profileView.style.display = 'block';
                    profileEdit.style.display = 'none';
                    profileModal.classList.add('active');
                }
            }

            function showMyProfile() {
                profileNameBig.textContent = currentNick;
                profileUsernameBig.textContent = '@' + currentUsername;
                profileStatusBig.textContent = currentStatus;
                profileBioBig.textContent = currentBio || 'Описание профиля';
                profileAvatarBig.textContent = currentAvatar;
                document.getElementById('profileModalTitle').textContent = 'Мой профиль';
                profileEditBtn.style.display = 'block';
                profileView.style.display = 'block';
                profileEdit.style.display = 'none';
                editName.value = currentNick;
                editUsername.value = currentUsername;
                editStatus.value = currentStatus;
                editBio.value = currentBio || '';
                editColor.value = profileColor;
                profileModal.classList.add('active');
            }

            profileArea.addEventListener('click', showMyProfile);

            profileModalClose.addEventListener('click', () => profileModal.classList.remove('active'));
            profileModal.addEventListener('click', (e) => {
                if (e.target === profileModal) profileModal.classList.remove('active');
            });

            profileEditBtn.addEventListener('click', function() {
                profileView.style.display = 'none';
                profileEdit.style.display = 'block';
            });

            profileSaveBtn.addEventListener('click', function() {
                const newNick = editName.value.trim() || 'Гость';
                const newUsername = editUsername.value.trim().toLowerCase().replace(/[^a-z0-9_]/g, '') || 'пользователь';
                const newStatus = editStatus.value.trim() || 'В сети';
                const newBio = editBio.value.trim() || '';
                const newColor = editColor.value;

                currentNick = newNick;
                currentUsername = newUsername;
                currentStatus = newStatus;
                currentBio = newBio;
                applyProfileColor(newColor);

                nickDisplay.textContent = currentNick;
                usernameDisplay.textContent = '@' + currentUsername;
                localStorage.setItem('chatNick', currentNick);
                localStorage.setItem('chatUsername', currentUsername);

                socket.emit('updateProfile', {
                    nick: currentNick,
                    username: currentUsername,
                    avatar: currentAvatar,
                    status: currentStatus,
                    bio: currentBio,
                    color: profileColor
                });

                profileModal.classList.remove('active');
            });

            // ============ АВАТАР ============
            avatarEmoji.addEventListener('click', function(e) {
                e.stopPropagation();
                const newAvatar = prompt('Введите эмодзи для аватара:', currentAvatar);
                if (newAvatar && newAvatar.trim()) {
                    currentAvatar = newAvatar.trim();
                    avatarEmoji.textContent = currentAvatar;
                    localStorage.setItem('chatAvatarEmoji', currentAvatar);
                    socket.emit('updateProfile', {
                        nick: currentNick,
                        username: currentUsername,
                        avatar: currentAvatar,
                        status: currentStatus,
                        bio: currentBio,
                        color: profileColor
                    });
                }
            });

            // ============ ЧАТ ============
            socket.on('chatHistory', (history) => {
                chatWindow.innerHTML = '';
                messageCount = history.length;
                chatBadge.textContent = messageCount;
                
                history.forEach(msg => {
                    const div = createMessageElement(msg);
                    chatWindow.appendChild(div);
                });
                chatWindow.scrollTop = chatWindow.scrollHeight;
            });

            socket.on('newMessage', (msg) => {
                const div = createMessageElement(msg);
                chatWindow.appendChild(div);
                chatWindow.scrollTop = chatWindow.scrollHeight;
                messageCount++;
                chatBadge.textContent = messageCount;
            });

            function createMessageElement(msg) {
                const div = document.createElement('div');
                const isSelf = msg.senderId === socket.id;
                div.className = `message ${isSelf ? 'message-self' : 'message-other'}`;
                
                let content = '';
                if (msg.avatar) {
                    content += `<span class="msg-avatar">${msg.avatar}</span>`;
                }
                
                let messageText = msg.message || '';
                messageText = processMentionsInText(messageText);
                
                const senderData = findUserById(msg.senderId);
                const senderName = senderData ? senderData.profile.nick : (msg.nick || 'Гость');
                const senderUsername = senderData ? senderData.profile.username : (msg.username || '');
                
                content += `<strong data-userid="${msg.senderId}" data-username="${senderUsername}">${senderName}:</strong> ${messageText}`;
                
                if (msg.media_url) {
                    const mediaTag = msg.media_type === 'gif' 
                        ? `<img src="${msg.media_url}" class="msg-gif" alt="gif" loading="lazy" />`
                        : `<img src="${msg.media_url}" class="msg-img" alt="image" loading="lazy" />`;
                    content += '<br>' + mediaTag;
                }
                
                div.innerHTML = content;
                
                const strong = div.querySelector('strong');
                if (strong) {
                    strong.style.cursor = 'pointer';
                    strong.addEventListener('click', function() {
                        const userId = this.dataset.userid;
                        if (userId && userProfiles[userId]) {
                            openProfile(userId);
                        }
                    });
                }
                
                return div;
            }

            function processMentionsInText(text) {
                const mentionRegex = /@([a-zA-Z0-9_]+)/g;
                let result = text;
                let match;
                const mentions = [];
                while ((match = mentionRegex.exec(text)) !== null) {
                    mentions.push({ username: match[1], index: match.index });
                }
                for (let i = mentions.length - 1; i >= 0; i--) {
                    const m = mentions[i];
                    const userData = findUserByUsername(m.username);
                    if (userData) {
                        const mentionHtml = `<span class="mention" data-userid="${userData.userId}" data-username="${m.username}">@${m.username}</span>`;
                        result = result.substring(0, m.index) + mentionHtml + result.substring(m.index + m.username.length + 1);
                    }
                }
                return result;
            }

            function findUserByUsername(username) {
                const clean = username.toLowerCase().replace(/^@/, '');
                for (const [id, profile] of Object.entries(userProfiles)) {
                    if (profile.username && profile.username.toLowerCase() === clean) {
                        return { userId: id, profile: profile };
                    }
                }
                return null;
            }

            function findUserById(userId) {
                if (userProfiles[userId]) {
                    return { userId: userId, profile: userProfiles[userId] };
                }
                if (userId === socket.id) {
                    return { userId: socket.id, profile: { 
                        nick: currentNick, 
                        username: currentUsername, 
                        avatar: currentAvatar,
                        status: currentStatus,
                        bio: currentBio,
                        color: profileColor
                    }};
                }
                return null;
            }

            function sendMessage() {
                const text = msgInput.value.trim();
                if (!text) return;

                const msgData = {
                    chatId: currentChat,
                    message: text,
                    nick: currentNick,
                    username: currentUsername,
                    avatar: currentAvatar,
                    senderId: socket.id
                };

                socket.emit('sendMessage', msgData);
                msgInput.value = '';
            }

            sendBtn.addEventListener('click', sendMessage);
            msgInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            // ============ МЕДИА ============
            addImgBtn.addEventListener('click', function() {
                const urls = [
                    'https://picsum.photos/seed/1/300/200',
                    'https://picsum.photos/seed/2/300/200',
                    'https://picsum.photos/seed/3/300/200'
                ];
                const url = urls[Math.floor(Math.random() * urls.length)];
                const msgData = {
                    chatId: currentChat,
                    message: '🖼️ Картинка',
                    nick: currentNick,
                    username: currentUsername,
                    avatar: currentAvatar,
                    senderId: socket.id,
                    media: {
                        url: url,
                        type: 'img'
                    }
                };
                socket.emit('sendMessage', msgData);
            });

            uploadBtn.addEventListener('click', function() {
                fileInput.click();
                fileInput.onchange = function(e) {
                    const file = this.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const msgData = {
                            chatId: currentChat,
                            message: '📷 Своё фото',
                            nick: currentNick,
                            username: currentUsername,
                            avatar: currentAvatar,
                            senderId: socket.id,
                            media: {
                                url: ev.target.result,
                                type: 'img'
                            }
                        };
                        socket.emit('sendMessage', msgData);
                    };
                    reader.readAsDataURL(file);
                    fileInput.value = '';
                };
            });

            // ============ ТЕМЫ ============
            function applyTheme(colors) {
                const root = document.documentElement;
                if (colors.bg) root.style.setProperty('--custom-bg', colors.bg);
                if (colors.text) root.style.setProperty('--custom-text', colors.text);
                if (colors.accent) root.style.setProperty('--custom-accent', colors.accent);
                if (colors.accent2) root.style.setProperty('--custom-accent2', colors.accent2);
                localStorage.setItem('customTheme', JSON.stringify(colors));
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active-custom'));
                themeCustomBtn.classList.add('active-custom');
            }

            function applyPreset(name) {
                const presets = {
                    dark: { bg: '#0a0a1a', text: '#ffffff', accent: '#f093fb', accent2: '#f5576c' },
                    light: { bg: '#f0f0f0', text: '#111111', accent: '#e070a0', accent2: '#d04060' },
                    red: { bg: '#1a0a0a', text: '#ffdddd', accent: '#ff4444', accent2: '#cc2222' },
                    blue: { bg: '#0a0a2a', text: '#ddeeff', accent: '#4488ff', accent2: '#2266dd' },
                    green: { bg: '#0a1a0a', text: '#ddffdd', accent: '#44ff88', accent2: '#22dd66' },
                    purple: { bg: '#1a0a2a', text: '#f0ddff', accent: '#aa44ff', accent2: '#8822dd' }
                };
                const theme = presets[name];
                if (theme) {
                    document.querySelector('.app-wrapper').className = 'app-wrapper app-' + name;
                    customBg.value = theme.bg;
                    customText.value = theme.text;
                    customAccent.value = theme.accent;
                    customAccent2.value = theme.accent2;
                    applyTheme(theme);
                }
            }

            themeCustomBtn.addEventListener('click', () => themeModal.classList.add('active'));
            themeModalClose.addEventListener('click', () => themeModal.classList.remove('active'));
            themeModal.addEventListener('click', (e) => {
                if (e.target === themeModal) themeModal.classList.remove('active');
            });

            saveThemeBtn.addEventListener('click', function() {
                const colors = {
                    bg: customBg.value,
                    text: customText.value,
                    accent: customAccent.value,
                    accent2: customAccent2.value
                };
                applyTheme(colors);
                document.querySelector('.app-wrapper').className = 'app-wrapper app-custom';
                themeModal.classList.remove('active');
            });

            document.querySelectorAll('.theme-btn[data-theme]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const theme = this.dataset.theme;
                    if (theme === 'custom') { themeModal.classList.add('active'); return; }
                    applyPreset(theme);
                    document.querySelectorAll('.theme-btn').forEach(b => b.className = 'theme-btn');
                    this.classList.add('active-' + theme);
                });
            });

            // Восстановление темы
            try {
                const saved = localStorage.getItem('customTheme');
                if (saved) {
                    const colors = JSON.parse(saved);
                    applyTheme(colors);
                    customBg.value = colors.bg || '#0a0a1a';
                    customText.value = colors.text || '#ffffff';
                    customAccent.value = colors.accent || '#f093fb';
                    customAccent2.value = colors.accent2 || '#f5576c';
                }
            } catch(e) {}

            // Восстановление аватара
            try {
                const savedAvatar = localStorage.getItem('chatAvatarEmoji');
                if (savedAvatar) currentAvatar = savedAvatar;
                avatarEmoji.textContent = currentAvatar;
            } catch(e) {}

            // ============ ЗВОНКИ ============
            // Упрощённые звонки через Socket.IO (без PeerJS)
            let callActive = false;

            callBtn.addEventListener('click', function() {
                if (callActive) {
                    alert('Звонок уже активен');
                    return;
                }
                const onlineList = Object.values(onlineUsers).filter(u => u.socketId !== socket.id);
                if (onlineList.length === 0) {
                    alert('Нет других пользователей для звонка');
                    return;
                }
                const choice = confirm('Начать общий звонок? Все пользователи чата смогут присоединиться.');
                if (!choice) return;
                
                socket.emit('startCall', { chatId: currentChat });
                callActive = true;
                callBtn.classList.add('active');
                callBtnText.textContent = 'В звонке';
                joinCallBtn.classList.remove('show');
                callStatus.classList.add('active');
                callStatusText.textContent = '🔴 Идет общий звонок';
                callModal.classList.add('active');
                callInfo.textContent = '🔴 Общий звонок (вы инициатор)';
            });

            joinCallBtn.addEventListener('click', function() {
                socket.emit('joinCall', { chatId: currentChat });
                callActive = true;
                callBtn.classList.add('active');
                callBtnText.textContent = 'В звонке';
                joinCallBtn.classList.remove('show');
                callStatus.classList.add('active');
                callStatusText.textContent = '🔴 Вы в общем звонке';
                callModal.classList.add('active');
                callInfo.textContent = '🔴 Вы в общем звонке';
            });

            hangupBtn.addEventListener('click', function() {
                socket.emit('leaveCall', { chatId: currentChat });
                endCall();
            });

            function endCall() {
                callModal.classList.remove('active');
                callBtn.classList.remove('active');
                callBtnText.textContent = 'Звонок';
                joinCallBtn.classList.remove('show');
                callStatus.classList.remove('active');
                callActive = false;
            }

            socket.on('callStarted', (data) => {
                if (data.chatId === currentChat && data.startedBy !== socket.id) {
                    callStatus.classList.add('active');
                    callStatusText.textContent = '🔔 ' + (data.startedByNick || 'Пользователь') + ' начал звонок!';
                    joinCallBtn.classList.add('show');
                    callBtn.style.display = 'none';
                }
            });

            socket.on('callParticipantJoined', (data) => {
                if (data.chatId === currentChat && data.participantId !== socket.id) {
                    participantsList.innerHTML = 'Участники: ' + data.participants.map(id => {
                        const u = onlineUsers[id];
                        return u ? u.nick : '?';
                    }).join(', ');
                }
            });

            socket.on('callParticipantLeft', (data) => {
                if (data.chatId === currentChat) {
                    participantsList.innerHTML = 'Участники: ' + data.participants.map(id => {
                        const u = onlineUsers[id];
                        return u ? u.nick : '?';
                    }).join(', ');
                    if (!data.participants.length && callActive) endCall();
                }
            });

            socket.on('callEnded', (data) => {
                if (data.chatId === currentChat) {
                    if (callActive) endCall();
                    callStatus.classList.remove('active');
                    joinCallBtn.classList.remove('show');
                    callBtn.style.display = 'inline-flex';
                    callBtnText.textContent = 'Звонок';
                    callActive = false;
                }
            });

            socket.on('callState', (data) => {
                if (data.chatId === currentChat) {
                    if (data.participants && data.participants.length) {
                        callStatus.classList.add('active');
                        callStatusText.textContent = '🔴 Общий звонок (' + data.participants.length + ' уч.)';
                        if (!callActive && data.startedBy !== socket.id) {
                            joinCallBtn.classList.add('show');
                            callBtn.style.display = 'none';
                        }
                    }
                }
            });

            console.log('🦫 Bober Chat готов!');
        })();
    </script>
</body>
</html>
