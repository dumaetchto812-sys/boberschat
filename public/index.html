<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bober Chat</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .chat {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            max-width: 600px;
            width: 100%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            color: white;
        }
        .header .nick {
            font-size: 0.8rem;
            opacity: 0.6;
        }
        .messages {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 12px;
            height: 400px;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }
        .msg {
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.05);
            color: #eee;
            font-size: 0.9rem;
        }
        .msg .msg-nick {
            color: #f093fb;
            font-weight: 600;
            margin-right: 6px;
        }
        .msg-self {
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.1);
        }
        .input-area {
            display: flex;
            gap: 8px;
        }
        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        .input-area input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .input-area button {
            padding: 10px 24px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .input-area button:hover {
            transform: scale(1.05);
        }
        .online-users {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
        }
        .online-users .user {
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="chat">
        <div class="header">
            <span>🦫 Bober Chat</span>
            <span class="nick" id="nickDisplay">Гость</span>
        </div>
        
        <div class="online-users" id="onlineUsers"></div>
        
        <div class="messages" id="messages"></div>
        
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Напиши сообщение..." />
            <button id="sendBtn">Отправить</button>
        </div>
    </div>

    <script>
        const socket = io();
        
        // DOM
        const messages = document.getElementById('messages');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const nickDisplay = document.getElementById('nickDisplay');
        const onlineUsers = document.getElementById('onlineUsers');
        
        let currentNick = 'Гость';
        
        // Смена ника
        const newNick = prompt('Введите ваш ник:', 'Гость');
        if (newNick) {
            currentNick = newNick;
            nickDisplay.textContent = currentNick;
        }
        
        // Регистрация
        socket.emit('register', { 
            nick: currentNick, 
            avatar: '👤',
            username: currentNick.toLowerCase().replace(/\s/g, '_')
        });
        
        // Отправка сообщения
        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            
            socket.emit('sendMessage', {
                message: text,
                nick: currentNick
            });
            
            msgInput.value = '';
        }
        
        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Получение истории
        socket.on('chatHistory', (history) => {
            messages.innerHTML = '';
            history.forEach(msg => {
                addMessage(msg);
            });
        });
        
        // Получение нового сообщения
        socket.on('newMessage', (msg) => {
            addMessage(msg);
            messages.scrollTop = messages.scrollHeight;
        });
        
        function addMessage(msg) {
            const div = document.createElement('div');
            const isSelf = msg.nick === currentNick;
            div.className = `msg ${isSelf ? 'msg-self' : ''}`;
            div.innerHTML = `<span class="msg-nick">${msg.nick}:</span> ${msg.message}`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        // Обновление онлайн-пользователей
        socket.on('onlineUsers', (users) => {
            const userList = Object.values(users);
            onlineUsers.innerHTML = userList.map(u => 
                `<span class="user">${u.avatar} ${u.nick}</span>`
            ).join('');
        });
        
        console.log('🦫 Bober Chat запущен!');
    </script>
</body>
</html>
