<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bober Chat</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a1a;
            padding: 16px;
        }
        .app {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 20px;
            max-width: 700px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            color: #fff;
            flex-wrap: wrap;
            gap: 8px;
        }
        .logo {
            font-size: 1.2rem;
            font-weight: 700;
        }
        .logo span { color: #f093fb; }
        .profile {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 10px 4px 4px;
            border-radius: 30px;
            background: rgba(255,255,255,0.05);
            border: 2px solid #f093fb;
            transition: 0.3s;
        }
        .profile:hover {
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 20px #f093fb;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        .nick { font-size: 0.85rem; }
        .theme-toggles {
            display: flex;
            gap: 2px;
            background: rgba(0,0,0,0.2);
            padding: 3px 6px;
            border-radius: 30px;
        }
        .theme-btn {
            background: none;
            border: none;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            cursor: pointer;
            color: rgba(255,255,255,0.4);
            transition: 0.2s;
        }
        .theme-btn:hover { color: #fff; }
        .theme-btn.active-light { background: rgba(255,255,255,0.2); color: #fff; }
        .theme-btn.active-dark { background: rgba(0,0,0,0.4); color: #fff; }
        .theme-btn.active-red { background: rgba(255,0,0,0.3); color: #fff; }
        .theme-btn.active-blue { background: rgba(0,100,255,0.3); color: #fff; }
        .theme-btn.active-green { background: rgba(0,200,100,0.3); color: #fff; }
        .theme-btn.active-purple { background: rgba(180,0,255,0.3); color: #fff; }
        .theme-btn.active-custom { background: #f093fb; color: #fff; }

        .online-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 6px 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin-bottom: 10px;
            min-height: 30px;
        }
        .online-list .user {
            color: rgba(255,255,255,0.5);
            font-size: 0.7rem;
            padding: 2px 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            cursor: pointer;
        }
        .online-list .user:hover {
            background: rgba(255,255,255,0.1);
        }
        .messages {
            background: rgba(0,0,0,0.3);
            border-radius: 14px;
            padding: 12px;
            height: 380px;
            overflow-y: auto;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        .msg {
            padding: 6px 12px;
            border-radius: 14px;
            max-width: 85%;
            color: #eee;
            font-size: 0.85rem;
            word-break: break-word;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-other {
            align-self: flex-start;
            background: rgba(255,255,255,0.06);
        }
        .msg-self {
            align-self: flex-end;
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.1);
        }
        .msg .msg-nick { color: #f093fb; font-weight: 600; margin-right: 4px; }
        .msg .msg-time { font-size: 0.5rem; opacity: 0.3; margin-left: 6px; }
        .input-area {
            display: flex;
            gap: 8px;
        }
        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .input-area input::placeholder { color: rgba(255,255,255,0.3); }
        .input-area input:focus { border-color: rgba(255,215,0,0.3); }
        .input-area button {
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .input-area button:hover { transform: scale(1.04); }
        .status { color: rgba(255,255,255,0.2); font-size: 0.65rem; text-align: center; margin-top: 8px; }

        /* ===== МОДАЛ ПРОФИЛЯ ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 2px solid #f093fb;
            border-radius: 24px;
            max-width: 420px;
            width: 100%;
            padding: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 40px #f093fb;
            animation: fadeIn 0.3s ease;
        }
        .modal-content .modal-close {
            float: right;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 1.2rem;
            cursor: pointer;
        }
        .modal-content .modal-close:hover { color: #fff; }
        .modal-content h3 {
            color: #fff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-content .form-group { margin-bottom: 12px; }
        .modal-content .form-group label {
            display: block;
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            margin-bottom: 4px;
        }
        .modal-content .form-group input,
        .modal-content .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        .modal-content .form-group input:focus,
        .modal-content .form-group textarea:focus { border-color: #f093fb; }
        .modal-content .form-group textarea { min-height: 60px; resize: vertical; }
        .modal-content .form-group input[type="color"] { height: 40px; padding: 2px; cursor: pointer; }
        .modal-content .btn-save {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal-content .btn-save:hover { transform: scale(1.02); }

        /* ===== МОДАЛ НАСТРОЙКИ ТЕМЫ ===== */
        .theme-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .theme-modal.active { display: flex; }
        .theme-modal-content {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 2px solid #f093fb;
            border-radius: 24px;
            max-width: 420px;
            width: 100%;
            padding: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 40px #f093fb;
            animation: fadeIn 0.3s ease;
        }
        .theme-modal-content .modal-close {
            float: right;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 1.2rem;
            cursor: pointer;
        }
        .theme-modal-content .modal-close:hover { color: #fff; }
        .theme-modal-content h3 {
            color: #fff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-modal-content .form-group { margin-bottom: 12px; }
        .theme-modal-content .form-group label {
            display: block;
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            margin-bottom: 4px;
        }
        .theme-modal-content .form-group input[type="color"],
        .theme-modal-content .form-group input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        .theme-modal-content .form-group input[type="color"] { height: 40px; padding: 2px; cursor: pointer; }
        .theme-modal-content .btn-save {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .theme-modal-content .btn-save:hover { transform: scale(1.02); }
        .preset-themes {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 12px;
        }
        .preset-themes button {
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.2s;
        }
        .preset-themes button:hover { background: rgba(255,255,255,0.1); }
        .preset-themes .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }

        /* ===== АДМИН-ПАНЕЛЬ ===== */
        .admin-panel {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255,0,0,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,0,0,0.1);
            display: none;
        }
        .admin-panel.active { display: block; }
        .admin-panel .admin-title {
            color: #ff6b6b;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .admin-panel .admin-search { display: flex; gap: 4px; }
        .admin-panel .admin-search input {
            flex: 1;
            padding: 4px 10px;
            border-radius: 16px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 0.75rem;
            outline: none;
        }
        .admin-panel .admin-search button {
            padding: 4px 12px;
            border-radius: 16px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: #fff;
            cursor: pointer;
            font-size: 0.65rem;
        }
        .admin-panel .admin-results {
            margin-top: 4px;
            max-height: 80px;
            overflow-y: auto;
        }
        .admin-panel .admin-results .result-item {
            padding: 3px 8px;
            border-radius: 6px;
            color: rgba(255,255,255,0.6);
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .admin-panel .admin-results .result-item:hover { background: rgba(255,255,255,0.05); }
        .admin-panel .admin-actions {
            display: flex;
            gap: 4px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .admin-panel .admin-actions button {
            padding: 3px 10px;
            border-radius: 14px;
            border: none;
            font-size: 0.6rem;
            cursor: pointer;
            color: #fff;
        }
        .admin-panel .admin-actions .warn { background: rgba(255,200,0,0.3); }
        .admin-panel .admin-actions .ban { background: rgba(255,0,0,0.3); }
        .admin-panel .admin-actions .unban { background: rgba(0,200,255,0.3); }
        .admin-panel .admin-reason {
            margin-top: 4px;
            padding: 3px 8px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 0.65rem;
            width: 100%;
            outline: none;
        }
        .admin-panel .admin-status { color: rgba(255,255,255,0.3); font-size: 0.55rem; margin-top: 2px; }

        /* ===== ТЕМЫ ===== */
        .app-light body { background: #f0f0f0; }
        .app-light .app { background: rgba(255,255,255,0.6); border-color: rgba(0,0,0,0.1); }
        .app-light .header { color: #111; }
        .app-light .nick { color: #111; }
        .app-light .msg { color: #111; }
        .app-light .msg-other { background: rgba(0,0,0,0.05); }
        .app-light .msg-self { background: rgba(255,215,0,0.15); }
        .app-light .online-list .user { color: #333; }
        .app-light .input-area input { background: rgba(255,255,255,0.5); color: #111; }
        .app-light .input-area input::placeholder { color: #888; }
        .app-light .modal-content { background: rgba(255,255,255,0.9); color: #111; }
        .app-light .modal-content .form-group input { color: #111; background: rgba(0,0,0,0.05); }
        .app-light .modal-content h3 { color: #111; }

        .app-red .app { border-color: #ff4444; }
        .app-red .profile { border-color: #ff4444; }
        .app-red .profile:hover { box-shadow: 0 0 20px #ff4444; }
        .app-red .logo span { color: #ff4444; }
        .app-red .msg .msg-nick { color: #ff6666; }
        .app-red .msg-self { border-color: #ff4444; }
        .app-red .input-area button { background: linear-gradient(135deg, #ff6666, #cc2222); }
        .app-red .theme-btn.active-red { background: rgba(255,0,0,0.3); }
        .app-red .modal-content { border-color: #ff4444; box-shadow: 0 0 40px #ff4444; }

        .app-blue .app { border-color: #4488ff; }
        .app-blue .profile { border-color: #4488ff; }
        .app-blue .profile:hover { box-shadow: 0 0 20px #4488ff; }
        .app-blue .logo span { color: #4488ff; }
        .app-blue .msg .msg-nick { color: #66aaff; }
        .app-blue .input-area button { background: linear-gradient(135deg, #4488ff, #2266dd); }
        .app-blue .theme-btn.active-blue { background: rgba(0,100,255,0.3); }
        .app-blue .modal-content { border-color: #4488ff; box-shadow: 0 0 40px #4488ff; }

        .app-green .app { border-color: #44ff88; }
        .app-green .profile { border-color: #44ff88; }
        .app-green .profile:hover { box-shadow: 0 0 20px #44ff88; }
        .app-green .logo span { color: #44ff88; }
        .app-green .msg .msg-nick { color: #66ffaa; }
        .app-green .input-area button { background: linear-gradient(135deg, #44ff88, #22dd66); }
        .app-green .theme-btn.active-green { background: rgba(0,200,100,0.3); }
        .app-green .modal-content { border-color: #44ff88; box-shadow: 0 0 40px #44ff88; }

        .app-purple .app { border-color: #aa44ff; }
        .app-purple .profile { border-color: #aa44ff; }
        .app-purple .profile:hover { box-shadow: 0 0 20px #aa44ff; }
        .app-purple .logo span { color: #aa44ff; }
        .app-purple .msg .msg-nick { color: #bb66ff; }
        .app-purple .input-area button { background: linear-gradient(135deg, #aa44ff, #8822dd); }
        .app-purple .theme-btn.active-purple { background: rgba(180,0,255,0.3); }
        .app-purple .modal-content { border-color: #aa44ff; box-shadow: 0 0 40px #aa44ff; }
    </style>
</head>
<body>
    <div class="app">
        <!-- ===== ХЕДЕР ===== -->
        <div class="header">
            <div class="logo">🦫 <span id="brandText">Bober</span> Chat</div>
            <div class="theme-toggles" id="themeToggles">
                <button class="theme-btn active-light" data-theme="light"><i class="fas fa-sun"></i></button>
                <button class="theme-btn" data-theme="dark"><i class="fas fa-moon"></i></button>
                <button class="theme-btn" data-theme="red"><i class="fas fa-heart"></i></button>
                <button class="theme-btn" data-theme="blue"><i class="fas fa-droplet"></i></button>
                <button class="theme-btn" data-theme="green"><i class="fas fa-leaf"></i></button>
                <button class="theme-btn" data-theme="purple"><i class="fas fa-gem"></i></button>
                <button class="theme-btn active-custom" id="themeCustomBtn"><i class="fas fa-palette"></i></button>
            </div>
            <div class="profile" id="profileClick">
                <div class="avatar" id="avatarDisplay">👤</div>
                <span class="nick" id="nickDisplay">Гость</span>
            </div>
        </div>

        <!-- ===== ОНЛАЙН ===== -->
        <div class="online-list" id="onlineList">
            <span style="color:rgba(255,255,255,0.2); font-size:0.65rem;">Онлайн:</span>
        </div>

        <!-- ===== ЧАТ ===== -->
        <div class="messages" id="messages">
            <div style="color:rgba(255,255,255,0.15); text-align:center; padding:20px;">💬 Напиши первое сообщение!</div>
        </div>

        <!-- ===== ВВОД ===== -->
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Напиши сообщение..." autocomplete="off" />
            <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>

        <div class="status" id="status">🔄 Подключение...</div>

        <!-- ===== АДМИН-ПАНЕЛЬ ===== -->
        <div class="admin-panel" id="adminPanel">
            <div class="admin-title"><i class="fas fa-shield-alt"></i> Админ-панель</div>
            <div class="admin-search">
                <input type="text" id="adminSearch" placeholder="🔍 Поиск по нику..." />
                <button id="adminSearchBtn"><i class="fas fa-search"></i></button>
            </div>
            <div class="admin-results" id="adminResults"></div>
            <div class="admin-actions">
                <button class="warn" id="adminWarn"><i class="fas fa-exclamation-triangle"></i> Варн</button>
                <button class="ban" id="adminBan"><i class="fas fa-ban"></i> Бан</button>
                <button class="unban" id="adminUnban"><i class="fas fa-unlock"></i> Разбан</button>
            </div>
            <input class="admin-reason" id="adminReason" placeholder="Причина..." />
            <div class="admin-status" id="adminStatus"></div>
        </div>
    </div>

    <!-- ===== МОДАЛ ПРОФИЛЯ ===== -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal-content">
            <button class="modal-close" id="profileModalClose"><i class="fas fa-times"></i></button>
            <h3><i class="fas fa-user"></i> <span id="profileModalTitle">Мой профиль</span></h3>
            <div id="profileView">
                <div style="text-align:center; margin-bottom:12px;">
                    <div style="font-size:3rem;" id="profileAvatarBig">👤</div>
                    <div style="font-weight:700; font-size:1.2rem; color:#fff;" id="profileNameBig">Имя</div>
                    <div style="opacity:0.5; font-size:0.8rem; color:#f093fb;" id="profileUsernameBig">@юзернейм</div>
                    <div style="opacity:0.6; font-size:0.85rem;" id="profileStatusBig">🟢 В сети</div>
                    <div style="opacity:0.6; font-size:0.9rem; margin-top:8px; padding-top:8px; border-top:1px solid rgba(255,255,255,0.05);" id="profileBioBig">Описание</div>
                </div>
                <button class="btn-save" id="profileEditBtn"><i class="fas fa-pen"></i> Редактировать</button>
            </div>
            <div id="profileEdit" style="display:none;">
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" id="editName" />
                </div>
                <div class="form-group">
                    <label>Юзернейм (@)</label>
                    <input type="text" id="editUsername" placeholder="только латиница и цифры" />
                </div>
                <div class="form-group">
                    <label>Статус</label>
                    <input type="text" id="editStatus" placeholder="В сети / Отошел / Не беспокоить" />
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="editBio"></textarea>
                </div>
                <div class="form-group">
                    <label>Цвет профиля</label>
                    <input type="color" id="editColor" value="#f093fb" />
                </div>
                <button class="btn-save" id="profileSaveBtn"><i class="fas fa-save"></i> Сохранить</button>
            </div>
        </div>
    </div>

    <!-- ===== МОДАЛ НАСТРОЙКИ ТЕМЫ ===== -->
    <div class="theme-modal" id="themeModal">
        <div class="theme-modal-content">
            <button class="modal-close" id="themeModalClose"><i class="fas fa-times"></i></button>
            <h3><i class="fas fa-palette"></i> Кастомизация темы</h3>
            <div class="preset-themes">
                <button onclick="applyPreset('dark')"><span class="dot" style="background:#0a0a1a;"></span>Тёмная</button>
                <button onclick="applyPreset('light')"><span class="dot" style="background:#f0f0f0;"></span>Светлая</button>
                <button onclick="applyPreset('red')"><span class="dot" style="background:#ff4444;"></span>Красная</button>
                <button onclick="applyPreset('blue')"><span class="dot" style="background:#4488ff;"></span>Синяя</button>
                <button onclick="applyPreset('green')"><span class="dot" style="background:#44ff88;"></span>Зелёная</button>
                <button onclick="applyPreset('purple')"><span class="dot" style="background:#aa44ff;"></span>Фиолетовая</button>
            </div>
            <div class="form-group">
                <label>Фон</label>
                <input type="color" id="customBg" value="#0a0a1a" />
            </div>
            <div class="form-group">
                <label>Цвет текста</label>
                <input type="color" id="customText" value="#ffffff" />
            </div>
            <div class="form-group">
                <label>Акцентный цвет</label>
                <input type="color" id="customAccent" value="#f093fb" />
            </div>
            <div class="form-group">
                <label>Второй акцент</label>
                <input type="color" id="customAccent2" value="#f5576c" />
            </div>
            <button class="btn-save" id="saveThemeBtn"><i class="fas fa-save"></i> Применить тему</button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ============ SOCKET ============
            const socket = io();

            // ============ DOM ============
            const messages = document.getElementById('messages');
            const msgInput = document.getElementById('msgInput');
            const sendBtn = document.getElementById('sendBtn');
            const nickDisplay = document.getElementById('nickDisplay');
            const avatarDisplay = document.getElementById('avatarDisplay');
            const onlineList = document.getElementById('onlineList');
            const status = document.getElementById('status');
            const brandText = document.getElementById('brandText');

            // ============ ПРОФИЛЬ ============
            const profileModal = document.getElementById('profileModal');
            const profileModalClose = document.getElementById('profileModalClose');
            const profileEditBtn = document.getElementById('profileEditBtn');
            const profileSaveBtn = document.getElementById('profileSaveBtn');
            const profileView = document.getElementById('profileView');
            const profileEdit = document.getElementById('profileEdit');
            const profileNameBig = document.getElementById('profileNameBig');
            const profileUsernameBig = document.getElementById('profileUsernameBig');
            const profileStatusBig = document.getElementById('profileStatusBig');
            const profileBioBig = document.getElementById('profileBioBig');
            const profileAvatarBig = document.getElementById('profileAvatarBig');
            const editName = document.getElementById('editName');
            const editUsername = document.getElementById('editUsername');
            const editStatus = document.getElementById('editStatus');
            const editBio = document.getElementById('editBio');
            const editColor = document.getElementById('editColor');

            // ============ ТЕМЫ ============
            const themeModal = document.getElementById('themeModal');
            const themeModalClose = document.getElementById('themeModalClose');
            const themeCustomBtn = document.getElementById('themeCustomBtn');
            const customBg = document.getElementById('customBg');
            const customText = document.getElementById('customText');
            const customAccent = document.getElementById('customAccent');
            const customAccent2 = document.getElementById('customAccent2');
            const saveThemeBtn = document.getElementById('saveThemeBtn');

            // ============ АДМИНКА ============
            const adminPanel = document.getElementById('adminPanel');
            const adminSearch = document.getElementById('adminSearch');
            const adminSearchBtn = document.getElementById('adminSearchBtn');
            const adminResults = document.getElementById('adminResults');
            const adminWarn = document.getElementById('adminWarn');
            const adminBan = document.getElementById('adminBan');
            const adminUnban = document.getElementById('adminUnban');
            const adminReason = document.getElementById('adminReason');
            const adminStatus = document.getElementById('adminStatus');

            // ============ ПЕРЕМЕННЫЕ ============
            let currentNick = localStorage.getItem('chatNick') || 'Гость';
            let currentUsername = localStorage.getItem('chatUsername') || 'гость';
            let currentAvatar = localStorage.getItem('chatAvatarEmoji') || '👤';
            let currentStatus = 'В сети';
            let currentBio = 'Привет! Я использую Bober Chat 🦫';
            let profileColor = localStorage.getItem('profileColor') || '#f093fb';
            let isConnected = false;
            let selectedUserId = null;

            // ============ ИНИЦИАЛИЗАЦИЯ ============
            nickDisplay.textContent = currentNick;
            avatarDisplay.textContent = currentAvatar;
            applyProfileColor(profileColor);

            function applyProfileColor(color) {
                profileColor = color;
                document.querySelector('.profile').style.borderColor = color;
                document.querySelector('.profile').style.boxShadow = `0 0 20px ${color}`;
                document.querySelector('.avatar').style.background = `linear-gradient(135deg, ${color}, #f5576c)`;
                document.querySelector('.modal-content').style.borderColor = color;
                document.querySelector('.modal-content').style.boxShadow = `0 30px 60px rgba(0,0,0,0.5), 0 0 40px ${color}`;
                localStorage.setItem('profileColor', color);
                if (editColor) editColor.value = color;
            }

            // ============ РЕГИСТРАЦИЯ ============
            function register() {
                if (!isConnected) return;
                socket.emit('register', {
                    nick: currentNick,
                    username: currentUsername,
                    avatar: currentAvatar,
                    status: currentStatus,
                    bio: currentBio,
                    color: profileColor,
                    socketId: socket.id
                });
                console.log('📝 Регистрация:', currentNick);
            }

            // ============ ОТПРАВКА СООБЩЕНИЯ ============
            function sendMessage() {
                const text = msgInput.value.trim();
                if (!text) return;

                socket.emit('sendMessage', {
                    chatId: 'main',
                    message: text,
                    nick: currentNick,
                    avatar: currentAvatar,
                    senderId: socket.id
                });

                msgInput.value = '';
                msgInput.focus();
            }

            sendBtn.addEventListener('click', sendMessage);
            msgInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            // ============ ПОЛУЧЕНИЕ СООБЩЕНИЙ ============
            socket.on('chatHistory', (data) => {
                messages.innerHTML = '';
                if (data && data.length) {
                    data.forEach(msg => addMessage(msg));
                } else {
                    messages.innerHTML = '<div style="color:rgba(255,255,255,0.15); text-align:center; padding:20px;">💬 Напиши первое сообщение!</div>';
                }
            });

            socket.on('newMessage', (msg) => {
                if (messages.querySelector('.msg-placeholder')) messages.innerHTML = '';
                addMessage(msg);
                messages.scrollTop = messages.scrollHeight;
            });

            function addMessage(msg) {
                const div = document.createElement('div');
                const isSelf = msg.senderId === socket.id;
                div.className = `msg ${isSelf ? 'msg-self' : 'msg-other'}`;
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                div.innerHTML = `<span class="msg-nick">${msg.nick || 'Гость'}:</span> ${msg.message || ''} <span class="msg-time">${time}</span>`;
                messages.appendChild(div);
                messages.scrollTop = messages.scrollHeight;
            }

            // ============ ОНЛАЙН-ПОЛЬЗОВАТЕЛИ ============
            socket.on('onlineUsers', (users) => {
                const userList = Object.values(users);
                if (!userList || userList.length === 0) {
                    onlineList.innerHTML = '<span style="color:rgba(255,255,255,0.2); font-size:0.65rem;">Онлайн: нет</span>';
                    return;
                }
                onlineList.innerHTML = '<span style="color:rgba(255,255,255,0.2); font-size:0.65rem;">Онлайн:</span> ' +
                    userList.map(u => `<span class="user" data-userid="${u.socketId}">${u.avatar || '👤'} ${u.nick}</span>`).join('');
                
                // Клик по пользователю для просмотра профиля
                document.querySelectorAll('.online-list .user').forEach(el => {
                    el.addEventListener('click', function() {
                        const userId = this.dataset.userid;
                        if (userId && userId !== socket.id) {
                            socket.emit('getUserProfile', userId);
                        }
                    });
                });
            });

            // ============ ПРОФИЛЬ ДРУГОГО ПОЛЬЗОВАТЕЛЯ ============
            socket.on('userProfile', (data) => {
                if (data) {
                    profileNameBig.textContent = data.nick || 'Гость';
                    profileUsernameBig.textContent = '@' + (data.username || 'пользователь');
                    profileStatusBig.textContent = data.status || '🟢 В сети';
                    profileBioBig.textContent = data.bio || 'Описание профиля';
                    profileAvatarBig.textContent = data.avatar || '👤';
                    document.getElementById('profileModalTitle').textContent = 'Профиль пользователя';
                    profileEditBtn.style.display = 'none';
                    profileView.style.display = 'block';
                    profileEdit.style.display = 'none';
                    profileModal.classList.add('active');
                }
            });

            // ============ СТАТУС ПОДКЛЮЧЕНИЯ ============
            socket.on('connect', () => {
                console.log('✅ Подключено к серверу');
                isConnected = true;
                status.textContent = '✅ Подключено';
                status.style.color = 'rgba(0,255,100,0.4)';
                register();
            });

            socket.on('disconnect', () => {
                isConnected = false;
                status.textContent = '❌ Отключено';
                status.style.color = 'rgba(255,0,0,0.3)';
            });

            socket.on('reconnect', () => {
                isConnected = true;
                status.textContent = '✅ Подключено';
                status.style.color = 'rgba(0,255,100,0.4)';
                register();
            });

            // ============ ПРОФИЛЬ (СВОЙ) ============
            document.getElementById('profileClick').addEventListener('click', function() {
                profileNameBig.textContent = currentNick;
                profileUsernameBig.textContent = '@' + currentUsername;
                profileStatusBig.textContent = currentStatus;
                profileBioBig.textContent = currentBio || 'Описание профиля';
                profileAvatarBig.textContent = currentAvatar;
                document.getElementById('profileModalTitle').textContent = 'Мой профиль';
                profileEditBtn.style.display = 'block';
                profileView.style.display = 'block';
                profileEdit.style.display = 'none';
                editName.value = currentNick;
                editUsername.value = currentUsername;
                editStatus.value = currentStatus;
                editBio.value = currentBio || '';
                editColor.value = profileColor;
                profileModal.classList.add('active');
            });

            profileModalClose.addEventListener('click', () => profileModal.classList.remove('active'));
            profileModal.addEventListener('click', (e) => {
                if (e.target === profileModal) profileModal.classList.remove('active');
            });

            profileEditBtn.addEventListener('click', function() {
                profileView.style.display = 'none';
                profileEdit.style.display = 'block';
            });

            profileSaveBtn.addEventListener('click', function() {
                const newNick = editName.value.trim() || 'Гость';
                const newUsername = editUsername.value.trim().toLowerCase().replace(/[^a-z0-9_]/g, '') || 'пользователь';
                const newStatus = editStatus.value.trim() || 'В сети';
                const newBio = editBio.value.trim() || '';
                const newColor = editColor.value;

                currentNick = newNick;
                currentUsername = newUsername;
                currentStatus = newStatus;
                currentBio = newBio;
                applyProfileColor(newColor);

                nickDisplay.textContent = currentNick;
                localStorage.setItem('chatNick', currentNick);
                localStorage.setItem('chatUsername', currentUsername);

                socket.emit('updateProfile', {
                    nick: currentNick,
                    username: currentUsername,
                    avatar: currentAvatar,
                    status: currentStatus,
                    bio: currentBio,
                    color: profileColor
                });

                profileModal.classList.remove('active');
            });

            // ============ АВАТАР ============
            document.getElementById('avatarDisplay').addEventListener('click', function(e) {
                e.stopPropagation();
                const emojis = ['👤', '😎', '🔥', '⭐', '🚀', '💎', '🌈', '🦊', '🐱', '🐶', '🐼', '🦄', '🍕', '🎮', '👾'];
                const newAvatar = prompt('Введите эмодзи для аватара:', currentAvatar);
                if (newAvatar && newAvatar.trim()) {
                    currentAvatar = newAvatar.trim();
                    avatarDisplay.textContent = currentAvatar;
                    localStorage.setItem('chatAvatarEmoji', currentAvatar);
                    socket.emit('updateProfile', {
                        nick: currentNick,
                        username: currentUsername,
                        avatar: currentAvatar,
                        status: currentStatus,
                        bio: currentBio,
                        color: profileColor
                    });
                }
            });

            // ============ ТЕМЫ ============
            function applyTheme(colors) {
                const root = document.documentElement;
                if (colors.bg) root.style.setProperty('--custom-bg', colors.bg);
                if (colors.text) root.style.setProperty('--custom-text', colors.text);
                if (colors.accent) root.style.setProperty('--custom-accent', colors.accent);
                if (colors.accent2) root.style.setProperty('--custom-accent2', colors.accent2);
                localStorage.setItem('customTheme', JSON.stringify(colors));
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active-custom'));
                document.getElementById('themeCustomBtn').classList.add('active-custom');
            }

            function applyPreset(name) {
                const presets = {
                    dark: { bg: '#0a0a1a', text: '#ffffff', accent: '#f093fb', accent2: '#f5576c' },
                    light: { bg: '#f0f0f0', text: '#111111', accent: '#e070a0', accent2: '#d04060' },
                    red: { bg: '#1a0a0a', text: '#ffdddd', accent: '#ff4444', accent2: '#cc2222' },
                    blue: { bg: '#0a0a2a', text: '#ddeeff', accent: '#4488ff', accent2: '#2266dd' },
                    green: { bg: '#0a1a0a', text: '#ddffdd', accent: '#44ff88', accent2: '#22dd66' },
                    purple: { bg: '#1a0a2a', text: '#f0ddff', accent: '#aa44ff', accent2: '#8822dd' }
                };
                const theme = presets[name];
                if (theme) {
                    document.body.className = 'app-' + name;
                    customBg.value = theme.bg;
                    customText.value = theme.text;
                    customAccent.value = theme.accent;
                    customAccent2.value = theme.accent2;
                    applyTheme(theme);
                }
            }

            themeCustomBtn.addEventListener('click', () => themeModal.classList.add('active'));
            themeModalClose.addEventListener('click', () => themeModal.classList.remove('active'));
            themeModal.addEventListener('click', (e) => {
                if (e.target === themeModal) themeModal.classList.remove('active');
            });

            saveThemeBtn.addEventListener('click', function() {
                const colors = {
                    bg: customBg.value,
                    text: customText.value,
                    accent: customAccent.value,
                    accent2: customAccent2.value
                };
                applyTheme(colors);
                document.body.className = 'app-custom';
                themeModal.classList.remove('active');
            });

            document.querySelectorAll('.theme-btn[data-theme]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const theme = this.dataset.theme;
                    if (theme === 'custom') { themeModal.classList.add('active'); return; }
                    applyPreset(theme);
                    document.querySelectorAll('.theme-btn').forEach(b => b.className = 'theme-btn');
                    this.classList.add('active-' + theme);
                });
            });

            // Восстановление темы
            try {
                const saved = localStorage.getItem('customTheme');
                if (saved) {
                    const colors = JSON.parse(saved);
                    applyTheme(colors);
                    customBg.value = colors.bg || '#0a0a1a';
                    customText.value = colors.text || '#ffffff';
                    customAccent.value = colors.accent || '#f093fb';
                    customAccent2.value = colors.accent2 || '#f5576c';
                }
            } catch(e) {}

            // Восстановление аватара
            try {
                const savedAvatar = localStorage.getItem('chatAvatarEmoji');
                if (savedAvatar) currentAvatar = savedAvatar;
                avatarDisplay.textContent = currentAvatar;
            } catch(e) {}

            // ============ АДМИНКА ============
            socket.on('userRoles', (roles) => {
                const myRole = roles[socket.id] || 'user';
                if (myRole === 'admin') {
                    adminPanel.classList.add('active');
                    adminStatus.textContent = '👑 Админ';
                }
            });

            socket.on('roleChanged', (data) => {
                if (data.role === 'admin') {
                    adminPanel.classList.add('active');
                    adminStatus.textContent = '👑 Админ';
                    alert('👑 Вы стали администратором!');
                }
            });

            adminSearchBtn.addEventListener('click', function() {
                const query = adminSearch.value.trim();
                if (!query) return;
                socket.emit('moderation:searchUser', { query: query });
            });

            adminSearch.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') adminSearchBtn.click();
            });

            socket.on('moderation:searchResults', (results) => {
                if (!results || !results.length) {
                    adminResults.innerHTML = '<div style="color:rgba(255,255,255,0.3); padding:4px;">Ничего не найдено</div>';
                    return;
                }
                adminResults.innerHTML = results.map(r => `
                    <div class="result-item" data-userid="${r.socketId}">
                        <span>${r.avatar || '👤'} ${r.nick}</span>
                        <span style="font-size:0.5rem; opacity:0.5;">${r.ip || 'unknown'}</span>
                    </div>
                `).join('');

                document.querySelectorAll('.result-item').forEach(el => {
                    el.addEventListener('click', function() {
                        selectedUserId = this.dataset.userid;
                        adminStatus.textContent = '🎯 Выбран пользователь';
                        adminResults.innerHTML = '';
                        adminSearch.value = '';
                    });
                });
            });

            adminWarn.addEventListener('click', function() {
                if (!selectedUserId) { alert('Сначала найдите пользователя'); return; }
                const reason = adminReason.value || 'Нарушение';
                socket.emit('moderation:warn', { targetId: selectedUserId, reason: reason });
                adminStatus.textContent = '⚠️ Предупреждение отправлено';
            });

            adminBan.addEventListener('click', function() {
                if (!selectedUserId) { alert('Сначала найдите пользователя'); return; }
                if (!confirm('Забанить этого пользователя?')) return;
                const reason = adminReason.value || 'Нарушение';
                socket.emit('moderation:ban', { targetId: selectedUserId, reason: reason, banIP: false });
                adminStatus.textContent = '🔒 Пользователь забанен';
            });

            adminUnban.addEventListener('click', function() {
                if (!selectedUserId) { alert('Сначала найдите пользователя'); return; }
                if (!confirm('Разбанить этого пользователя?')) return;
                socket.emit('moderation:unban', { targetId: selectedUserId });
                adminStatus.textContent = '🔓 Пользователь разбанен';
            });

            socket.on('notification', (msg) => {
                adminStatus.textContent = msg;
                setTimeout(() => {
                    if (adminStatus.textContent === msg) adminStatus.textContent = '';
                }, 5000);
            });

            // ============ ЗАПУСК ============
            socket.emit('joinChat', 'main');
            register();

            console.log('🦫 Bober Chat готов!');
        })();
    </script>
</body>
</html>
