<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bober Chat</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: background 0.25s ease, color 0.2s ease, border-color 0.2s, box-shadow 0.2s;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 20% 30%, #1a1a2e, #16213e);
            padding: 16px;
        }

        .app-wrapper {
            display: flex;
            gap: 16px;
            max-width: 900px;
            width: 100%;
            align-items: flex-start;
        }

        /* ===== БОКОВАЯ ПАНЕЛЬ ===== */
        .sidebar {
            flex: 0 0 200px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-height: 600px;
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 12px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }

        .sidebar-title {
            color: rgba(255,255,255,0.6);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-left: 6px;
        }

        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 16px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            transition: 0.2s;
            color: rgba(255,255,255,0.7);
        }
        .chat-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .chat-item.active {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        .chat-item i {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
        }
        .chat-item .chat-name {
            font-weight: 500;
            font-size: 0.9rem;
        }
        .chat-item .chat-badge {
            margin-left: auto;
            background: rgba(255, 215, 0, 0.2);
            color: #f7d794;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* Звонки в боковой панели */
        .call-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        #onlineUsers {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .online-user {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
        }
        .online-user .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ff88;
            margin-left: auto;
            flex-shrink: 0;
        }
        .online-user .user-avatar {
            font-size: 1.2rem;
        }

        #callStatus {
            display: none;
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(255,200,0,0.1);
            border-radius: 12px;
            text-align: center;
            color: #ffd93d;
            font-size: 0.8rem;
        }
        #callStatus.active {
            display: block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* ===== ОСНОВНОЙ ЧАТ ===== */
        .chat-app {
            flex: 1;
            min-width: 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 48px 48px 32px 32px;
            padding: 24px 24px 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            background-image: linear-gradient(135deg, rgba(255, 215, 0, 0.05), rgba(255, 100, 200, 0.05), rgba(0, 200, 255, 0.05));
            background-size: 300% 300%;
            animation: shimmer 8s ease-in-out infinite alternate;
        }

        @keyframes shimmer {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: 0.5px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: color 0.3s;
        }
        .brand i { font-size: 1.6rem; }
        .brand span { transition: color 0.3s; }

        .theme-toggles {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 8px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .theme-btn {
            background: transparent;
            border: none;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            transition: 0.2s;
            white-space: nowrap;
        }
        .theme-btn i { font-size: 0.8rem; }
        .theme-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .theme-btn.active-light {
            background: rgba(255, 255, 255, 0.2);
            color: #111;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }
        .theme-btn.active-dark {
            background: rgba(0, 0, 0, 0.4);
            color: #f0f0f0;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.4);
        }
        .theme-btn.active-red {
            background: rgba(255, 0, 0, 0.2);
            color: #ffdddd;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.3);
        }
        .theme-btn.active-blue {
            background: rgba(0, 100, 255, 0.2);
            color: #ddeeff;
            box-shadow: 0 0 12px rgba(0, 100, 255, 0.3);
        }
        .theme-btn.active-green {
            background: rgba(0, 200, 100, 0.2);
            color: #ddffdd;
            box-shadow: 0 0 12px rgba(0, 200, 100, 0.3);
        }
        .theme-btn.active-purple {
            background: rgba(180, 0, 255, 0.2);
            color: #f0ddff;
            box-shadow: 0 0 12px rgba(180, 0, 255, 0.3);
        }

        .profile-area {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px 4px 6px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .avatar-wrapper {
            position: relative;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-wrapper .avatar-emoji {
            font-size: 1.3rem;
            line-height: 1;
        }
        .avatar-wrapper .avatar-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.2s;
            border-radius: 50%;
            color: white;
            font-size: 0.6rem;
            font-weight: 600;
        }
        .avatar-wrapper:hover .avatar-overlay {
            opacity: 1;
        }

        .nick-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #nickDisplay {
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
            background: transparent;
            border: none;
            max-width: 100px;
            padding: 2px 0;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }
        #nickDisplay:focus {
            outline: none;
            border-bottom-color: rgba(255, 255, 255, 0.4);
        }

        .nick-edit-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 30px;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .nick-edit-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .chat-window {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 16px 16px;
            margin: 14px 0 14px;
            min-height: 300px;
            max-height: 380px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }
        .chat-window::-webkit-scrollbar {
            width: 4px;
        }
        .chat-window::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 12px;
        }
        .chat-window::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }

        .message {
            padding: 8px 14px;
            border-radius: 20px;
            max-width: 85%;
            word-break: break-word;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            color: #f0f0f0;
            animation: fadeUp 0.3s ease;
            font-size: 0.9rem;
        }
        .message strong {
            color: #f7d794;
            margin-right: 4px;
        }
        .message .msg-gif, .message .msg-img {
            max-width: 100%;
            border-radius: 14px;
            margin-top: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .message .msg-gif { max-height: 140px; }
        .message .msg-img { max-height: 160px; }
        .message-self {
            align-self: flex-end;
            background: rgba(255, 215, 0, 0.12);
            border: 1px solid rgba(255, 215, 0, 0.15);
        }
        .message-other { align-self: flex-start; }
        .message-call {
            align-self: center;
            background: rgba(255, 200, 0, 0.1);
            border: 1px solid rgba(255, 200, 0, 0.15);
            text-align: center;
            font-size: 0.8rem;
            max-width: 95%;
        }
        .message-call strong {
            color: #ffd93d;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .input-area {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
            align-items: center;
        }
        .input-area input[type="text"] {
            flex: 2 1 180px;
            padding: 10px 16px;
            border-radius: 60px;
            border: none;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
            color: #fff;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.2s;
            min-width: 120px;
        }
        .input-area input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .input-area input[type="text"]:focus {
            outline: none;
            border-color: rgba(255, 215, 0, 0.3);
            background: rgba(0, 0, 0, 0.35);
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            padding: 8px 12px;
            border-radius: 60px;
            color: #eee;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .action-btn i { font-size: 0.9rem; }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .action-btn.send-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
            color: white;
            box-shadow: 0 4px 10px rgba(245, 87, 108, 0.3);
        }
        .action-btn.send-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 16px rgba(245, 87, 108, 0.4);
        }
        .action-btn.call-btn {
            background: rgba(0, 200, 100, 0.15);
            border-color: rgba(0, 200, 100, 0.2);
        }
        .action-btn.call-btn:hover {
            background: rgba(0, 200, 100, 0.25);
        }
        .action-btn.call-btn.active {
            background: rgba(255, 200, 0, 0.25);
            border-color: rgba(255, 200, 0, 0.3);
            animation: pulse 1.5s infinite;
        }
        .action-btn.join-call-btn {
            background: rgba(0, 200, 255, 0.15);
            border-color: rgba(0, 200, 255, 0.2);
            display: none;
        }
        .action-btn.join-call-btn:hover {
            background: rgba(0, 200, 255, 0.25);
        }
        .action-btn.join-call-btn.show {
            display: inline-flex;
        }
        .action-btn.img-btn {
            background: rgba(0, 255, 150, 0.08);
            border-color: rgba(0, 255, 150, 0.12);
        }
        .action-btn.upload-btn {
            background: rgba(255, 200, 0, 0.08);
            border-color: rgba(255, 200, 0, 0.12);
        }
        #fileInput {
            display: none;
        }

        /* ===== МОДАЛ ЗВОНКА ===== */
        .call-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .call-modal.active {
            display: flex;
        }
        .call-modal video {
            width: 80%;
            max-width: 480px;
            border-radius: 16px;
            background: #000;
            border: 2px solid rgba(255,255,255,0.15);
            margin: 8px;
        }
        .call-modal .call-controls {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }
        .call-modal .call-controls button {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .call-modal .call-controls .hangup-btn {
            background: #ff4444;
            color: white;
        }
        .call-modal .call-controls .hangup-btn:hover {
            background: #cc0000;
            transform: scale(1.1);
        }
        .call-modal .call-controls .mute-btn {
            background: #444;
            color: white;
        }
        .call-modal .call-controls .mute-btn:hover {
            background: #666;
        }
        .call-modal .call-info {
            color: white;
            font-size: 1.1rem;
            margin-bottom: 16px;
            text-align: center;
        }
        .call-modal .participants-list {
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            margin-bottom: 12px;
            text-align: center;
        }
        .call-modal .participants-list span {
            background: rgba(255,255,255,0.08);
            padding: 3px 10px;
            border-radius: 16px;
            margin: 3px;
            display: inline-block;
        }

        /* ===== ТЕМЫ ===== */
        .app-light .sidebar {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(0,0,0,0.05);
        }
        .app-light .sidebar-title { color: #555; }
        .app-light .chat-item { color: #333; }
        .app-light .chat-item:hover { background: rgba(0,0,0,0.05); color: #111; }
        .app-light .chat-item.active {
            background: rgba(0,0,0,0.08);
            border-color: rgba(0,0,0,0.1);
            color: #111;
        }
        .app-light .chat-app {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .app-light .chat-window {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.05);
        }
        .app-light .message {
            background: rgba(255, 255, 255, 0.5);
            color: #1a1a1a;
            border-color: rgba(0, 0, 0, 0.04);
        }
        .app-light .message strong { color: #b45f06; }
        .app-light #nickDisplay { color: #111; }
        .app-light .profile-area {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0,0,0,0.05);
        }
        .app-light .input-area input[type="text"] {
            background: rgba(255, 255, 255, 0.5);
            color: #111;
            border-color: rgba(0,0,0,0.05);
        }
        .app-light .input-area input[type="text"]::placeholder { color: #444; }
        .app-light .action-btn {
            color: #222;
            background: rgba(255,255,255,0.4);
            border-color: rgba(0,0,0,0.05);
        }
        .app-light .action-btn.send-btn { color: white; }
        .app-light .theme-btn { color: #222; }
        .app-light .theme-btn.active-light {
            background: rgba(0,0,0,0.08);
            color: #111;
            box-shadow: 0 0 8px rgba(0,0,0,0.08);
        }
        .app-light .nick-edit-btn { color: #333; }
        .app-light .brand { color: #222; }
        .app-light .chat-item .chat-badge { background: rgba(0,0,0,0.08); color: #555; }
        .app-light .online-user { color: #333; }
        .app-light .online-user .status-dot { background: #00aa55; }

        .app-dark .sidebar {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255,255,255,0.05);
        }
        .app-dark .sidebar-title { color: #888; }
        .app-dark .chat-item { color: #ccc; }
        .app-dark .chat-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .app-dark .chat-item.active {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.08);
            color: #fff;
        }
        .app-dark .chat-app {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border-color: rgba(255, 255, 255, 0.05);
        }
        .app-dark .chat-window {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.03);
        }
        .app-dark .message {
            background: rgba(30, 30, 40, 0.6);
            color: #eaeaea;
            border-color: rgba(255, 255, 255, 0.03);
        }
        .app-dark .message strong { color: #f7d794; }
        .app-dark #nickDisplay { color: #eee; }
        .app-dark .profile-area {
            background: rgba(0, 0, 0, 0.25);
            border-color: rgba(255,255,255,0.05);
        }
        .app-dark .input-area input[type="text"] {
            background: rgba(0, 0, 0, 0.4);
            color: #eee;
            border-color: rgba(255,255,255,0.05);
        }
        .app-dark .input-area input[type="text"]::placeholder { color: #888; }
        .app-dark .action-btn {
            color: #ccc;
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.05);
        }
        .app-dark .action-btn.send-btn { color: white; }
        .app-dark .theme-btn { color: #aaa; }
        .app-dark .theme-btn.active-dark {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.08);
        }
        .app-dark .nick-edit-btn { color: #aaa; }
        .app-dark .brand { color: #eee; }

        .app-red .sidebar {
            background: rgba(180, 20, 20, 0.25);
            border-color: rgba(255, 80, 80, 0.1);
        }
        .app-red .sidebar-title { color: #ffaaaa; }
        .app-red .chat-item { color: #ffcccc; }
        .app-red .chat-item:hover { background: rgba(255,80,80,0.08); color: #fff; }
        .app-red .chat-item.active {
            background: rgba(255,80,80,0.12);
            border-color: rgba(255,80,80,0.15);
            color: #fff;
        }
        .app-red .chat-app {
            background: rgba(180, 20, 20, 0.3);
            backdrop-filter: blur(12px);
            border-color: rgba(255, 80, 80, 0.2);
            box-shadow: 0 20px 40px rgba(180, 0, 0, 0.25);
        }
        .app-red .chat-window {
            background: rgba(100, 0, 0, 0.15);

<body>
    <div class="app-wrapper">
        <!-- ===== БОКОВАЯ ПАНЕЛЬ ===== -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-title"><i class="fas fa-comments"></i> Чаты</div>
            <div class="chat-list" id="chatList">
                <div class="chat-item active" data-chat="main">
                    <i class="fas fa-home"></i>
                    <span class="chat-name">Общий чат</span>
                    <span class="chat-badge" id="chatBadge">0</span>
                </div>
            </div>

            <div class="call-section">
                <div class="sidebar-title"><i class="fas fa-phone"></i> Звонки</div>
                <div id="onlineUsers">
                    <div style="color: rgba(255,255,255,0.3); font-size: 0.75rem; padding: 4px;">Нет онлайн-пользователей</div>
                </div>
                <div id="callStatus">
                    <i class="fas fa-phone"></i> <span id="callStatusText">Идет общий звонок</span>
                </div>
            </div>
        </div>

        <!-- ===== ОСНОВНОЙ ЧАТ ===== -->
        <div class="chat-app" id="chatApp">
            <div class="header">
                <div class="brand" id="brandLogo">
                    <i class="fas fa-crown"></i>
                    <span id="brandText">Bober Chat</span>
                </div>

                <div class="theme-toggles" id="themeToggles">
                    <button class="theme-btn active-light" data-theme="light"><i class="fas fa-sun"></i></button>
                    <button class="theme-btn" data-theme="dark"><i class="fas fa-moon"></i></button>
                    <button class="theme-btn" data-theme="red"><i class="fas fa-heart"></i></button>
                    <button class="theme-btn" data-theme="blue"><i class="fas fa-droplet"></i></button>
                    <button class="theme-btn" data-theme="green"><i class="fas fa-leaf"></i></button>
                    <button class="theme-btn" data-theme="purple"><i class="fas fa-gem"></i></button>
                </div>

                <div class="profile-area">
                    <div class="avatar-wrapper" id="avatarWrapper">
                        <div class="avatar-emoji" id="avatarEmoji">👤</div>
                        <img id="avatarImg" style="display:none;" alt="avatar" />
                        <div class="avatar-overlay"><i class="fas fa-camera"></i></div>
                    </div>
                    <div class="nick-wrapper">
                        <input type="text" id="nickDisplay" value="Гость" maxlength="20" spellcheck="false">
                        <button class="nick-edit-btn" id="editNickBtn" title="Сменить ник"><i class="fas fa-pen"></i></button>
                    </div>
                </div>
            </div>

            <div class="chat-window" id="chatWindow">
                <div class="message message-other"><strong>🤖 Бот:</strong> Добро пожаловать в Bober Chat!</div>
            </div>

            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Напиши сообщение..." />
                <button class="action-btn send-btn" id="sendMsgBtn"><i class="fas fa-paper-plane"></i></button>
                <button class="action-btn img-btn" id="addImgBtn"><i class="fas fa-image"></i> Картинка</button>
                <button class="action-btn upload-btn" id="uploadBtn"><i class="fas fa-upload"></i> Своё</button>
                <button class="action-btn call-btn" id="callBtn"><i class="fas fa-phone"></i> <span id="callBtnText">Звонок</span></button>
                <button class="action-btn join-call-btn" id="joinCallBtn"><i class="fas fa-sign-in-alt"></i> Присоединиться</button>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <div style="margin-top: 8px; text-align: center; font-size: 0.65rem; opacity: 0.3; color: #ccc;">
                <i class="fas fa-phone"></i> Нажми "Звонок" для общего разговора
            </div>
        </div>
    </div>

    <!-- ===== МОДАЛ ЗВОНКА ===== -->
    <div class="call-modal" id="callModal">
        <div class="call-info" id="callInfo">Общий звонок</div>
        <div class="participants-list" id="participantsList"></div>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted style="width: 160px; max-width: 160px; position: fixed; bottom: 100px; right: 20px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.15);"></video>
        <div class="call-controls">
            <button class="mute-btn" id="muteBtn"><i class="fas fa-microphone"></i></button>
            <button class="hangup-btn" id="hangupBtn"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ============ ПОДКЛЮЧЕНИЕ ============
            const socket = io();
            
            // ============ PEERJS ============
            let peer = null;
            let currentCall = null;
            let localStream = null;
            let remoteStream = null;
            let myPeerId = null;
            let isMuted = false;
            let callActive = false;
            let isCallInitiator = false;

            // ============ DOM ============
            const chatWindow = document.getElementById('chatWindow');
            const msgInput = document.getElementById('msgInput');
            const sendBtn = document.getElementById('sendMsgBtn');
            const addImgBtn = document.getElementById('addImgBtn');
            const uploadBtn = document.getElementById('uploadBtn');
            const fileInput = document.getElementById('fileInput');
            const nickInput = document.getElementById('nickDisplay');
            const editNickBtn = document.getElementById('editNickBtn');
            const avatarWrapper = document.getElementById('avatarWrapper');
            const avatarEmoji = document.getElementById('avatarEmoji');
            const avatarImg = document.getElementById('avatarImg');
            const themeToggles = document.getElementById('themeToggles');
            const chatList = document.getElementById('chatList');
            const chatBadge = document.getElementById('chatBadge');
            const callBtn = document.getElementById('callBtn');
            const callBtnText = document.getElementById('callBtnText');
            const joinCallBtn = document.getElementById('joinCallBtn');
            const callModal = document.getElementById('callModal');
            const callInfo = document.getElementById('callInfo');
            const participantsList = document.getElementById('participantsList');
            const remoteVideo = document.getElementById('remoteVideo');
            const localVideo = document.getElementById('localVideo');
            const muteBtn = document.getElementById('muteBtn');
            const hangupBtn = document.getElementById('hangupBtn');
            const onlineUsersDiv = document.getElementById('onlineUsers');
            const callStatus = document.getElementById('callStatus');
            const callStatusText = document.getElementById('callStatusText');

            // ============ ПЕРЕМЕННЫЕ ============
            let currentNick = localStorage.getItem('chatNick') || 'Гость';
            let currentAvatar = localStorage.getItem('chatAvatarEmoji') || '👤';
            let currentChat = 'main';
            let messageCount = 0;
            let onlineUsers = {};
            let callParticipants = [];
            let callPeerId = null;

            // ============ ИНИЦИАЛИЗАЦИЯ ============
            nickInput.value = currentNick;
            avatarEmoji.textContent = currentAvatar;

            // ============ PEERJS ============
            function initPeer() {
                peer = new Peer({
                    config: {
                        'iceServers': [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:stun1.l.google.com:19302' }
                        ]
                    }
                });

                peer.on('open', (id) => {
                    myPeerId = id;
                    console.log('🟢 Peer ID:', id);
                    socket.emit('register', { 
                        nick: currentNick, 
                        peerId: id,
                        avatar: currentAvatar,
                        socketId: socket.id 
                    });
                });

                peer.on('call', (call) => {
                    console.log('📞 Входящий звонок от:', call.peer);
                    if (currentCall) {
                        call.close();
                        return;
                    }
                    
                    if (!callActive) {
                        joinCallBtn.classList.add('show');
                        callBtn.style.display = 'none';
                        callStatus.classList.add('active');
                        callStatusText.textContent = '🔔 Входящий звонок!';
                    }
                    
                    window.pendingCall = call;
                });
            }

            // ============ НАЧАЛО ОБЩЕГО ЗВОНКА ============
            function startCall() {
                if (callActive) {
                    alert('Звонок уже активен');
                    return;
                }

                const onlineList = Object.values(onlineUsers).filter(u => u.socketId !== socket.id);
                if (onlineList.length === 0) {
                    alert('Нет других пользователей для звонка');
                    return;
                }

                const choice = confirm('Начать общий звонок? Все пользователи чата смогут присоединиться.');
                if (!choice) return;

                const callTypeChoice = confirm('Нажмите "ОК" для видеозвонка или "Отмена" для голосового');
                const useVideo = callTypeChoice;

                navigator.mediaDevices.getUserMedia({ 
                    audio: true, 
                    video: useVideo 
                }).then((stream) => {
                    localStream = stream;
                    localVideo.srcObject = stream;
                    
                    socket.emit('startCall', {
                        chatId: currentChat,
                        peerId: myPeerId
                    });
                    
                    callActive = true;
                    isCallInitiator = true;
                    callBtn.classList.add('active');
                    callBtnText.textContent = 'В звонке';
                    joinCallBtn.classList.remove('show');
                    callStatus.classList.add('active');
                    callStatusText.textContent = '🔴 Идет общий звонок';
                    
                    callModal.classList.add('active');
                    callInfo.textContent = '🔴 Общий звонок (вы инициатор)';
                    updateParticipantsList([socket.id]);
                    
                    addCallMessage('📞 ' + currentNick + ' начал общий звонок! Присоединяйтесь!');
                    
                }).catch((err) => {
                    console.error('❌ Ошибка доступа к медиа:', err);
                    alert('Не удалось получить доступ к микрофону/камере');
                });
            }

            // ============ ПРИСОЕДИНИТЬСЯ К ЗВОНКУ ============
            function joinCall() {
                if (callActive) {
                    alert('Вы уже в звонке');
                    return;
                }

                if (!window.pendingCall) {
                    alert('Нет активного звонка для подключения');
                    return;
                }

                const call = window.pendingCall;
                
                navigator.mediaDevices.getUserMedia({ 
                    audio: true, 
                    video: true 
                }).then((stream) => {
                    localStream = stream;
                    localVideo.srcObject = stream;
                    
                    call.answer(stream);
                    currentCall = call;
                    callActive = true;
                    isCallInitiator = false;
                    
                    call.on('stream', (remoteStream) => {
                        remoteStream = remoteStream;
                        remoteVideo.srcObject = remoteStream;
                    });
                    
                    call.on('close', () => {
                        endCall();
                    });
                    
                    socket.emit('joinCall', {
                        chatId: currentChat,
                        peerId: myPeerId
                    });
                    
                    callBtn.classList.add('active');
                    callBtnText.textContent = 'В звонке';
                    joinCallBtn.classList.remove('show');
                    callStatus.classList.add('active');
                    callStatusText.textContent = '🔴 Вы в общем звонке';
                    
                    callModal.classList.add('active');
                    callInfo.textContent = '🔴 Вы в общем звонке';
                    
                    window.pendingCall = null;
                    
                    addCallMessage('👤 ' + currentNick + ' присоединился к звонку');
                    
                }).catch((err) => {
                    console.error('❌ Ошибка доступа к медиа:', err);
                    alert('Не удалось получить доступ к микрофону/камере');
                });
            }

            // ============ ЗАВЕРШЕНИЕ ЗВОНКА ============
            function endCall() {
                if (currentCall) {
                    currentCall.close();
                    currentCall = null;
                }
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                    localStream = null;
                }
                if (remoteStream) {
                    remoteStream.getTracks().forEach(track => track.stop());
                    remoteStream = null;
                }
                
                localVideo.srcObject = null;
                remoteVideo.srcObject = null;
                callModal.classList.remove('active');
                callInfo.textContent = '';
                callBtn.classList.remove('active');
                callBtnText.textContent = 'Звонок';
                joinCallBtn.classList.remove('show');
                callStatus.classList.remove('active');
                callActive = false;
                isCallInitiator = false;
                isMuted = false;
                muteBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                window.pendingCall = null;
                
                socket.emit('leaveCall', { chatId: currentChat });
                
                addCallMessage('📴 ' + currentNick + ' покинул звонок');
            }

            // ============ СОБЫТИЯ ЗВОНКА ОТ СЕРВЕРА ============
            
            socket.on('callStarted', (data) => {
                if (data.chatId === currentChat && data.startedBy !== socket.id) {
                    callPeerId = data.peerId;
                    callParticipants = data.participants || [];
                    callStatus.classList.add('active');
                    callStatusText.textContent = '🔔 ' + data.startedByNick + ' начал общий звонок!';
                    joinCallBtn.classList.add('show');
                    callBtn.style.display = 'none';
                    addCallMessage('📞 ' + data.startedByNick + ' начал общий звонок! Нажми "Присоединиться"');
                }
            });

            socket.on('callParticipantJoined', (data) => {
                if (data.chatId === currentChat && data.participantId !== socket.id) {
                    callParticipants = data.participants || [];
                    updateParticipantsList(callParticipants);
                    if (callActive) {
                        addCallMessage('👤 ' + data.nick + ' присоединился к звонку');
                    }
                }
            });

            socket.on('callParticipantLeft', (data) => {
                if (data.chatId === currentChat) {
                    callParticipants = data.participants || [];
                    updateParticipantsList(callParticipants);
                    if (callActive) {
                        addCallMessage('👤 ' + data.nick + ' покинул звонок');
                    }
                    if (callParticipants.length === 0 && callActive) {
                        addCallMessage('📴 Все участники покинули звонок');
                        endCall();
                    }
                }
            });

            socket.on('callEnded', (data) => {
                if (data.chatId === currentChat) {
                    addCallMessage('📴 Общий звонок завершен');
                    if (callActive) {
                        endCall();
                    }
                    callStatus.classList.remove('active');
                    joinCallBtn.classList.remove('show');
                    callBtn.style.display = 'inline-flex';
                    callBtnText.textContent = 'Звонок';
                    callActive = false;
                }
            });

            socket.on('callState', (data) => {
                if (data.chatId === currentChat) {
                    callParticipants = data.participants || [];
                    callPeerId = data.peerId;
                    if (data.participants && data.participants.length > 0) {
                        callStatus.classList.add('active');
                        callStatusText.textContent = '🔴 Идет общий звонок (' + data.participants.length + ' уч.)';
                        if (!callActive && data.startedBy !== socket.id) {
                            joinCallBtn.classList.add('show');
                            callBtn.style.display = 'none';
                        }
                    }
                }
            });

            // ============ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ============
            
            function updateParticipantsList(participants) {
                const userList = participants.map(id => {
                    const user = onlineUsers[id];
                    return user ? user.nick : 'Неизвестный';
                }).join(' ');
                participantsList.innerHTML = 'Участники: ' + (userList || 'только вы');
            }

            function addCallMessage(text) {
                const div = document.createElement('div');
                div.className = 'message message-call';
                div.innerHTML = `<strong>📞</strong> ${text}`;
                chatWindow.appendChild(div);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }

            // ============ ОБНОВЛЕНИЕ ОНЛАЙН-ПОЛЬЗОВАТЕЛЕЙ ============
            function updateOnlineUsers() {
                const users = Object.values(onlineUsers).filter(u => u.socketId !== socket.id);
                if (users.length === 0) {
                    onlineUsersDiv.innerHTML = '<div style="color: rgba(255,255,255,0.3); font-size: 0.75rem; padding: 4px;">Нет онлайн-пользователей</div>';
                    return;
                }
                
                onlineUsersDiv.innerHTML = users.map(u => `
                    <div class="online-user">
                        <span class="user-avatar">${u.avatar || '👤'}</span>
                        <span>${u.nick}</span>
                        <span class="status-dot"></span>
                    </div>
                `).join('');
            }

            // ============ СОЗДАНИЕ СООБЩЕНИЯ ============
            function createMessageElement(msg) {
                const div = document.createElement('div');
                const isSelf = msg.nick === currentNick;
                div.className = `message ${isSelf ? 'message-self' : 'message-other'}`;
                
                let content = `<strong>${msg.nick || 'Гость'}:</strong> ${msg.message || ''}`;
                
                if (msg.media_url) {
                    const mediaTag = msg.media_type === 'gif' 
                        ? `<img src="${msg.media_url}" class="msg-gif" alt="gif" loading="lazy" />`
                        : `<img src="${msg.media_url}" class="msg-img" alt="image" loading="lazy" />`;
                    content += '<br>' + mediaTag;
                }
                
                div.innerHTML = content;
                return div;
            }

            // ============ ОТПРАВКА СООБЩЕНИЯ ============
            function sendMessage() {
                const text = msgInput.value.trim();
                if (!text) return;

                const msgData = {
                    chatId: currentChat,
                    message: text,
                    nick: currentNick,
                    avatar: currentAvatar
                };

                socket.emit('sendMessage', msgData);
                msgInput.value = '';
                
                // Оптимистичное добавление
                const tempMsg = {
                    nick: currentNick,
                    message: text,
                    avatar: currentAvatar
                };
                const div = createMessageElement(tempMsg);
                chatWindow.appendChild(div);
                chatWindow.scrollTop = chatWindow.scrollHeight;
                messageCount++;
                chatBadge.textContent = messageCount;
            }

            // ============ ОТПРАВКА КАРТИНКИ ============
            function sendMedia(type) {
                const urls = {
                    img: [
                        'https://picsum.photos/seed/1/300/200',
                        'https://picsum.photos/seed/2/300/200',
                        'https://picsum.photos/seed/3/300/200',
                        'https://picsum.photos/seed/4/300/200',
                        'https://picsum.photos/seed/5/300/200'
                    ]
                };

                const url = urls[type][Math.floor(Math.random() * urls[type].length)];
                const msgData = {
                    chatId: currentChat,
                    message: '🖼️ Картинка',
                    nick: currentNick,
                    avatar: currentAvatar,
                    media: {
                        url: url,
                        type: 'img'
                    }
                };

                socket.emit('sendMessage', msgData);
                
                // Оптимистичное добавление
                const tempMsg = {
                    nick: currentNick,
                    message: '🖼️ Картинка',
                    media_url: url,
                    media_type: 'img'
                };
                const div = createMessageElement(tempMsg);
                chatWindow.appendChild(div);
                chatWindow.scrollTop = chatWindow.scrollHeight;
                messageCount++;
                chatBadge.textContent = messageCount;
            }

            // ============ ЗАГРУЗКА СВОЕЙ КАРТИНКИ ============
            function uploadOwnImage() {
                fileInput.click();
                fileInput.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const msgData = {
                            chatId: currentChat,
                            message: '📷 Своё фото',
                            nick: currentNick,
                            avatar: currentAvatar,
                            media: {
                                url: ev.target.result,
                                type: 'img'
                            }
                        };
                        socket.emit('sendMessage', msgData);
                        
                        // Оптимистичное добавление
                        const tempMsg = {
                            nick: currentNick,
                            message: '📷 Своё фото',
                            media_url: ev.target.result,
                            media_type: 'img'
                        };
                        const div = createMessageElement(tempMsg);
                        chatWindow.appendChild(div);
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                        messageCount++;
                        chatBadge.textContent = messageCount;
                    };
                    reader.readAsDataURL(file);
                    fileInput.value = '';
                };
            }

            // ============ WEBSOCKET ============
            socket.on('connect', () => {
                console.log('✅ Подключен к серверу');
                initPeer();
            });

            socket.on('onlineUsers', (users) => {
                onlineUsers = users;
                updateOnlineUsers();
                if (callActive && callParticipants.length > 0) {
                    updateParticipantsList(callParticipants);
                }
            });

            socket.on('userDisconnected', (socketId) => {
                delete onlineUsers[socketId];
                updateOnlineUsers();
            });

            socket.on('chatHistory', (history) => {
                chatWindow.innerHTML = '';
                messageCount = history.length;
                chatBadge.textContent = messageCount;
                
                history.forEach(msg => {
                    const div = createMessageElement(msg);
                    chatWindow.appendChild(div);
                });
                
                chatWindow.scrollTop = chatWindow.scrollHeight;
            });

            socket.on('newMessage', (msg) => {
                const div = createMessageElement(msg);
                chatWindow.appendChild(div);
                chatWindow.scrollTop = chatWindow.scrollHeight;
                messageCount++;
                chatBadge.textContent = messageCount;
            });

            socket.on('error', (msg) => {
                console.error('❌ Ошибка:', msg);
                alert('Ошибка: ' + msg);
            });

            // ============ СОБЫТИЯ КНОПОК ============
            sendBtn.addEventListener('click', sendMessage);
            msgInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            addImgBtn.addEventListener('click', () => sendMedia('img'));
            uploadBtn.addEventListener('click', uploadOwnImage);
            
            callBtn.addEventListener('click', startCall);
            joinCallBtn.addEventListener('click', joinCall);
            hangupBtn.addEventListener('click', endCall);
            
            muteBtn.addEventListener('click', () => {
                if (localStream) {
                    isMuted = !isMuted;
                    localStream.getAudioTracks().forEach(track => {
                        track.enabled = !isMuted;
                    });
                    muteBtn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
                }
            });

            // ============ СМЕНА НИКА ============
            editNickBtn.addEventListener('click', () => {
                const newNick = prompt('Введите новый ник:', currentNick);
                if (newNick && newNick.trim()) {
                    currentNick = newNick.trim();
                    nickInput.value = currentNick;
                    localStorage.setItem('chatNick', currentNick);
                    if (peer && myPeerId) {
                        socket.emit('register', { 
                            nick: currentNick, 
                            peerId: myPeerId,
                            avatar: currentAvatar,
                            socketId: socket.id 
                        });
                    }
                }
            });

            // ============ СМЕНА АВАТАРА ============
            avatarWrapper.addEventListener('click', () => {
                const choice = confirm('Выберите способ:\n\n• Нажмите "ОК" — выбрать эмодзи\n• Нажмите "Отмена" — загрузить фото');
                if (choice) {
                    const newEmoji = prompt('Введите эмодзи:', currentAvatar);
                    if (newEmoji && newEmoji.trim()) {
                        currentAvatar = newEmoji.trim();
                        avatarEmoji.textContent = currentAvatar;
                        avatarImg.style.display = 'none';
                        avatarEmoji.style.display = 'block';
                        localStorage.setItem('chatAvatarEmoji', currentAvatar);
                        if (peer && myPeerId) {
                            socket.emit('register', { 
                                nick: currentNick, 
                                peerId: myPeerId,
                                avatar: currentAvatar,
                                socketId: socket.id 
                            });
                        }
                    }
                } else {
                    fileInput.click();
                    fileInput.onchange = (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            avatarImg.src = ev.target.result;
                            avatarImg.style.display = 'block';
                            avatarEmoji.style.display = 'none';
                            localStorage.setItem('chatAvatarImage', ev.target.result);
                            currentAvatar = '🖼️';
                            if (peer && myPeerId) {
                                socket.emit('register', { 
                                    nick: currentNick, 
                                    peerId: myPeerId,
                                    avatar: '🖼️',
                                    socketId: socket.id 
                                });
                            }
                        };
                        reader.readAsDataURL(file);
                        fileInput.value = '';
                    };
                }
            });

            // ============ ТЕМЫ ============
            themeToggles.addEventListener('click', (e) => {
                const btn = e.target.closest('.theme-btn');
                if (!btn) return;
                const theme = btn.dataset.theme;
                const wrapper = document.querySelector('.app-wrapper');
                wrapper.className = 'app-wrapper';
                if (theme !== 'light') {
                    wrapper.classList.add(`app-${theme}`);
                }
                
                document.querySelectorAll('.theme-btn').forEach(b => {
                    b.className = 'theme-btn';
                });
                btn.classList.add(`active-${theme}`);
                localStorage.setItem('chatTheme', theme);
            });

            // Восстановление темы
            const savedTheme = localStorage.getItem('chatTheme') || 'light';
            document.querySelector(`.theme-btn[data-theme="${savedTheme}"]`)?.click();

            // Восстановление аватара-картинки
            try {
                const savedImage = localStorage.getItem('chatAvatarImage');
                if (savedImage) {
                    avatarImg.src = savedImage;
                    avatarImg.style.display = 'block';
                    avatarEmoji.style.display = 'none';
                    currentAvatar = '🖼️';
                }
            } catch(e) {}

            // ============ ПРИСОЕДИНЕНИЕ К ЧАТУ ============
            socket.emit('joinChat', 'main');

            socket.on('connect', () => {
                if (peer && myPeerId) {
                    socket.emit('register', { 
                        nick: currentNick, 
                        peerId: myPeerId,
                        avatar: currentAvatar,
                        socketId: socket.id 
                    });
                }
            });

            console.log('🚀 Bober Chat готов!');
        })();
    </script>
</body>
</html>
