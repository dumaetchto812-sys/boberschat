<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bober Chat</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .app {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 24px;
            max-width: 700px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #fff;
        }
        .header .logo {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .header .logo span {
            color: #f093fb;
        }
        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .profile .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .profile .nick {
            font-size: 0.9rem;
            color: #fff;
            cursor: pointer;
        }
        .users {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            min-height: 36px;
        }
        .users .user {
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            padding: 2px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }
        .messages {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 16px;
            height: 400px;
            overflow-y: auto;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }
        .msg {
            padding: 8px 14px;
            border-radius: 16px;
            max-width: 80%;
            color: #eee;
            font-size: 0.9rem;
            word-break: break-word;
        }
        .msg-other {
            align-self: flex-start;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.04);
        }
        .msg-self {
            align-self: flex-end;
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.1);
        }
        .msg .msg-nick {
            color: #f093fb;
            font-weight: 600;
            margin-right: 6px;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .input-area input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .input-area input:focus {
            border-color: rgba(255,215,0,0.3);
        }
        .input-area button {
            padding: 12px 28px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .input-area button:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 20px rgba(245,87,108,0.3);
        }
        .admin-panel {
            margin-top: 12px;
            padding: 12px;
            background: rgba(255,0,0,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,0,0,0.1);
            display: none;
        }
        .admin-panel.active {
            display: block;
        }
        .admin-panel .admin-title {
            color: #ff6b6b;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .admin-panel .admin-search {
            display: flex;
            gap: 6px;
        }
        .admin-panel .admin-search input {
            flex: 1;
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 0.8rem;
            outline: none;
        }
        .admin-panel .admin-search button {
            padding: 6px 16px;
            border-radius: 20px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: #fff;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .admin-panel .admin-results {
            margin-top: 8px;
            max-height: 100px;
            overflow-y: auto;
        }
        .admin-panel .admin-results .result-item {
            padding: 4px 10px;
            border-radius: 8px;
            color: rgba(255,255,255,0.7);
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .admin-panel .admin-results .result-item:hover {
            background: rgba(255,255,255,0.05);
        }
        .admin-panel .admin-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .admin-panel .admin-actions button {
            padding: 4px 12px;
            border-radius: 20px;
            border: none;
            font-size: 0.65rem;
            cursor: pointer;
            color: #fff;
        }
        .admin-panel .admin-actions .warn { background: rgba(255,200,0,0.3); }
        .admin-panel .admin-actions .ban { background: rgba(255,0,0,0.3); }
        .admin-panel .admin-actions .unban { background: rgba(0,200,255,0.3); }
        .admin-panel .admin-reason {
            margin-top: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 0.7rem;
            width: 100%;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">🦫 <span>Bober</span> Chat</div>
            <div class="profile">
                <div class="avatar" id="avatarDisplay">👤</div>
                <span class="nick" id="nickDisplay">Гость</span>
            </div>
        </div>

        <div class="users" id="usersList">
            <span style="color:rgba(255,255,255,0.3); font-size:0.7rem;">Онлайн:</span>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Напиши сообщение..." />
            <button id="sendBtn"><i class="fas fa-paper-plane"></i> Отправить</button>
        </div>

        <!-- Админ-панель (видна только админам) -->
        <div class="admin-panel" id="adminPanel">
            <div class="admin-title"><i class="fas fa-shield-alt"></i> Админ-панель</div>
            <div class="admin-search">
                <input type="text" id="adminSearch" placeholder="🔍 Поиск по нику или @юзу..." />
                <button id="adminSearchBtn"><i class="fas fa-search"></i></button>
            </div>
            <div class="admin-results" id="adminResults"></div>
            <div class="admin-actions">
                <button class="warn" id="adminWarn"><i class="fas fa-exclamation-triangle"></i> Варн</button>
                <button class="ban" id="adminBan"><i class="fas fa-ban"></i> Бан</button>
                <button class="ban" id="adminBanIP"><i class="fas fa-globe"></i> Бан IP</button>
                <button class="unban" id="adminUnban"><i class="fas fa-unlock"></i> Разбан</button>
            </div>
            <input class="admin-reason" id="adminReason" placeholder="Причина..." />
            <div id="adminStatus" style="color:rgba(255,255,255,0.3); font-size:0.6rem; margin-top:4px;"></div>
        </div>
    </div>

    <script>
        // ============ ПОДКЛЮЧЕНИЕ ============
        const socket = io();

        // ============ DOM ============
        const messages = document.getElementById('messages');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const nickDisplay = document.getElementById('nickDisplay');
        const avatarDisplay = document.getElementById('avatarDisplay');
        const usersList = document.getElementById('usersList');

        // ============ ПЕРЕМЕННЫЕ ============
        let currentNick = localStorage.getItem('chatNick') || 'Гость';
        let currentAvatar = '👤';
        let mySocketId = null;

        // ============ ИНИЦИАЛИЗАЦИЯ ============
        nickDisplay.textContent = currentNick;
        avatarDisplay.textContent = currentAvatar;

        // Регистрация на сервере
        socket.emit('register', {
            nick: currentNick,
            avatar: currentAvatar,
            username: currentNick.toLowerCase().replace(/\s/g, '_')
        });

        // ============ ОТПРАВКА СООБЩЕНИЯ ============
        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) {
                console.log('⚠️ Пустое сообщение');
                return;
            }

            console.log('📤 Отправка:', text);

            socket.emit('sendMessage', {
                chatId: 'main',
                message: text,
                nick: currentNick,
                avatar: currentAvatar,
                senderId: socket.id
            });

            msgInput.value = '';
            msgInput.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // ============ ПОЛУЧЕНИЕ ИСТОРИИ ============
        socket.on('chatHistory', (data) => {
            console.log('📜 История:', data);
            messages.innerHTML = '';
            if (data && data.length) {
                data.forEach(msg => addMessage(msg));
            }
        });

        // ============ ПОЛУЧЕНИЕ НОВОГО СООБЩЕНИЯ ============
        socket.on('newMessage', (msg) => {
            console.log('📩 Новое сообщение:', msg);
            addMessage(msg);
            messages.scrollTop = messages.scrollHeight;
        });

        // ============ ДОБАВЛЕНИЕ СООБЩЕНИЯ ============
        function addMessage(msg) {
            const div = document.createElement('div');
            const isSelf = msg.senderId === socket.id || msg.nick === currentNick;
            div.className = `msg ${isSelf ? 'msg-self' : 'msg-other'}`;
            div.innerHTML = `<span class="msg-nick">${msg.nick || 'Гость'}:</span> ${msg.message || ''}`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        // ============ ОБНОВЛЕНИЕ ОНЛАЙН-ПОЛЬЗОВАТЕЛЕЙ ============
        socket.on('onlineUsers', (users) => {
            console.log('👥 Онлайн:', users);
            const userList = Object.values(users);
            if (userList.length === 0) {
                usersList.innerHTML = '<span style="color:rgba(255,255,255,0.3); font-size:0.7rem;">Онлайн: нет</span>';
                return;
            }
            usersList.innerHTML = '<span style="color:rgba(255,255,255,0.3); font-size:0.7rem;">Онлайн:</span> ' +
                userList.map(u => `<span class="user">${u.avatar || '👤'} ${u.nick}</span>`).join('');
        });

        // ============ СОХРАНЕНИЕ НИКА ============
        nickDisplay.addEventListener('dblclick', () => {
            const newNick = prompt('Введите новый ник:', currentNick);
            if (newNick && newNick.trim()) {
                currentNick = newNick.trim();
                nickDisplay.textContent = currentNick;
                localStorage.setItem('chatNick', currentNick);
                socket.emit('register', {
                    nick: currentNick,
                    avatar: currentAvatar,
                    username: currentNick.toLowerCase().replace(/\s/g, '_')
                });
            }
        });

        // ============ АДМИН-ПАНЕЛЬ ============
        let isAdmin = false;
        let selectedUserId = null;

        socket.on('userRoles', (roles) => {
            const myRole = roles[socket.id] || 'user';
            isAdmin = myRole === 'admin';
            document.getElementById('adminPanel').classList.toggle('active', isAdmin);
            if (isAdmin) {
                document.getElementById('adminStatus').textContent = '👑 Админ';
            }
        });

        // Если первый пользователь — админ
        socket.on('roleChanged', (data) => {
            if (data.role === 'admin') {
                isAdmin = true;
                document.getElementById('adminPanel').classList.add('active');
                document.getElementById('adminStatus').textContent = '👑 Админ';
                alert('👑 Вы стали администратором!');
            }
        });

        // Поиск пользователя
        document.getElementById('adminSearchBtn').addEventListener('click', () => {
            const query = document.getElementById('adminSearch').value.trim();
            if (!query) return;
            socket.emit('moderation:searchUser', { query: query });
        });

        document.getElementById('adminSearch').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('adminSearchBtn').click();
        });

        socket.on('moderation:searchResults', (results) => {
            const container = document.getElementById('adminResults');
            if (!results || !results.length) {
                container.innerHTML = '<div style="color:rgba(255,255,255,0.3); padding:4px;">Ничего не найдено</div>';
                return;
            }
            container.innerHTML = results.map(r => `
                <div class="result-item" data-userid="${r.socketId}">
                    <span>${r.avatar || '👤'} ${r.nick}</span>
                    <span style="font-size:0.5rem; opacity:0.5;">${r.ip || 'unknown'}</span>
                </div>
            `).join('');

            document.querySelectorAll('.result-item').forEach(el => {
                el.addEventListener('click', function() {
                    selectedUserId = this.dataset.userid;
                    document.getElementById('adminStatus').textContent = '🎯 Выбран: ' + this.textContent.trim();
                    document.getElementById('adminResults').innerHTML = '';
                    document.getElementById('adminSearch').value = '';
                });
            });
        });

        // Действия админа
        document.getElementById('adminWarn').addEventListener('click', () => {
            if (!selectedUserId) { alert('Сначала найдите пользователя'); return; }
            const reason = document.getElementById('adminReason').value || 'Нарушение';
            socket.emit('moderation:warn', { targetId: selectedUserId, reason: reason });
            document.getElementById('adminStatus').textContent = '⚠️ Предупреждение отправлено';
        });

        document.getElementById('adminBan').addEventListener('click', () => {
            if (!selectedUserId) { alert('Сначала найдите пользователя'); return; }
            if (!confirm('Забанить этого пользователя?')) return;
            const reason = document.getElementById('adminReason').value || 'Нарушение';
            socket.emit('moderation:ban', { targetId: selectedUserId, reason: reason, banIP: false });
            document.getElementById('adminStatus').textContent = '🔒 Пользователь забанен';
        });

        document.getElementById('adminBanIP').addEventListener('click', () => {
            if (!selectedUserId) { alert('Сначала найдите пользователя'); return; }
            if (!confirm('Забанить пользователя и его IP?')) return;
            const reason = document.getElementById('adminReason').value || 'Нарушение (IP бан)';
            socket.emit('moderation:ban', { targetId: selectedUserId, reason: reason, banIP: true });
            document.getElementById('adminStatus').textContent = '🌐 Пользователь и IP забанены';
        });

        document.getElementById('adminUnban').addEventListener('click', () => {
            if (!selectedUserId) { alert('Сначала найдите пользователя'); return; }
            if (!confirm('Разбанить этого пользователя?')) return;
            socket.emit('moderation:unban', { targetId: selectedUserId });
            document.getElementById('adminStatus').textContent = '🔓 Пользователь разбанен';
        });

        // Уведомления
        socket.on('notification', (msg) => {
            console.log('📢', msg);
            document.getElementById('adminStatus').textContent = msg;
            setTimeout(() => {
                if (document.getElementById('adminStatus').textContent === msg) {
                    document.getElementById('adminStatus').textContent = '';
                }
            }, 5000);
        });

        // Проверка подключения
        socket.on('connect', () => {
            console.log('✅ Подключено к серверу');
            socket.emit('register', {
                nick: currentNick,
                avatar: currentAvatar,
                username: currentNick.toLowerCase().replace(/\s/g, '_')
            });
        });

        socket.on('disconnect', () => {
            console.log('❌ Отключено от сервера');
        });

        socket.on('error', (err) => {
            console.error('❌ Ошибка:', err);
        });

        console.log('🦫 Bober Chat запущен!');
        console.log('👤 Твой ник:', currentNick);
        console.log('🔌 Socket ID:', socket.id);
    </script>
</body>
</html>
